name: mactop-diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Probe mactop
        run: .github/scripts/probe-mactop.sh
