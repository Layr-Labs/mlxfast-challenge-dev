name: benchmark

# Dispatch-only: maintainers or the benchmark orchestrator start the expensive
# Apple Silicon run explicitly. No PR/push triggers should burn macOS minutes.
#
# The workflow benchmarks whatever ref it is dispatched on. The Yukon eigenbot
# creates submission branches (submissions/*) that differ from main only in
# benchmark.json editablePaths, so running them directly is safe: submission-branch
# runs still enforce the modifiable surface and the static cheat review, and
# suppress submitted-process logs.
on:
  workflow_dispatch:
    inputs:
      reference_download_jobs:
        description: "Parallel shard downloads for setup.sh."
        required: false
        default: "12"
        type: string
      reference_min_free_gib:
        description: "Minimum free GiB required before reference checkpoint download."
        required: false
        default: "170"
        type: string
      verify_transform:
        description: "Run deterministic transform verification before timing."
        required: false
        default: false
        type: boolean
      run_benchmark:
        description: "Run the timed benchmark after the correctness gate."
        required: false
        default: true
        type: boolean
      range_1:
        description: "Base-case step range for correctness slice 1, as START-END (half-open). Only used when run_benchmark is true."
        required: false
        default: "0-21"
        type: string
      range_2:
        description: "Base-case step range for correctness slice 2, as START-END (half-open). Only used when run_benchmark is true."
        required: false
        default: "21-42"
        type: string
      range_3:
        description: "Base-case step range for correctness slice 3, as START-END (half-open). Only used when run_benchmark is true."
        required: false
        default: "42-64"
        type: string
permissions:
  contents: read

# Unlike parallel-correctness-probe.yml/reference-cache-probe.yml (which already
# have this), a duplicate dispatch on the same ref (retry after a timeout,
# double-click) used to run all 6 jobs in full parallel twice -- no correctness
# risk (artifact names are run_id/run_attempt-scoped) but 2x Blacksmith cost.
# cancel-in-progress: false queues the second run rather than killing the first.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cheap, checkout-free, secret-free sanity check that runs before any of the
  # three expensive (up to 360min, full checkpoint download+transform) slice
  # machines start. combine-parallel-correctness.sh's own "Range coverage
  # check" catches a bad range_1/2/3 too, but only after all three slices (plus
  # benchmark-timing/benchmark-gates) have already run to completion -- a
  # manual-dispatch typo would otherwise burn up to 5 full Blacksmith runs
  # before the mistake is reported.
  validate-slice-ranges:
    name: "validate correctness slice ranges"
    if: ${{ inputs.run_benchmark }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      MLXFAST_EXPECTED_CORRECTNESS_STEPS: "64"
    steps:
      - name: Check range_1/range_2/range_3 partition the full step window
        env:
          RANGE_1: ${{ inputs.range_1 }}
          RANGE_2: ${{ inputs.range_2 }}
          RANGE_3: ${{ inputs.range_3 }}
        run: |
          set -euo pipefail
          ranges_file="$(mktemp)"
          trap 'rm -f "${ranges_file}"' EXIT
          for pair in "range_1=${RANGE_1}" "range_2=${RANGE_2}" "range_3=${RANGE_3}"; do
            name="${pair%%=*}"
            range="${pair#*=}"
            if [[ ! "${range}" =~ ^[0-9]+-[0-9]+$ ]]; then
              echo "::error::${name} (\"${range}\") is not START-END with non-negative integers" >&2
              exit 1
            fi
            start="${range%-*}"
            end="${range#*-}"
            if [[ "${end}" -le "${start}" ]]; then
              echo "::error::${name} (\"${range}\") must have end > start" >&2
              exit 1
            fi
            jq -n --arg name "${name}" --argjson start "${start}" --argjson end "${end}" \
              '{name: $name, start: $start, end: $end}' >> "${ranges_file}"
          done

          coverage_ok="$(jq -s -r --argjson expected "${MLXFAST_EXPECTED_CORRECTNESS_STEPS}" '
            sort_by(.start) as $sorted
            | ($sorted | length) as $n
            | if $n == 0 then "false"
              elif $sorted[0].start != 0 then "false"
              elif $sorted[$n - 1].end != $expected then "false"
              else ([range(0; $n - 1) | ($sorted[.].end == $sorted[. + 1].start)] | all) | tostring
              end
          ' "${ranges_file}")"
          if [[ "${coverage_ok}" != "true" ]]; then
            echo "::error::range_1/range_2/range_3 do not exactly partition [0, ${MLXFAST_EXPECTED_CORRECTNESS_STEPS}) -- a gap or overlap exists" >&2
            jq -s -r 'sort_by(.start)[] | "  \(.name): [\(.start), \(.end))"' "${ranges_file}" >&2
            exit 1
          fi
          echo "validate-slice-ranges: range_1/range_2/range_3 exactly partition [0, ${MLXFAST_EXPECTED_CORRECTNESS_STEPS})"

  # The base correctness case (64 teacher-forced steps) is checked in parallel,
  # in three slices, on three independent machines -- not serially inside the
  # benchmark job. Teacher-forced checking always feeds the GOLDEN token (never
  # the model's own prediction) as input to the next step, so a slice's verdict
  # is independent of what happens outside its range as long as it seeds its
  # context with the golden prefix up to its start step, which
  # compareTeacherForcedWithWorker already does. This is why splitting is sound,
  # not just fast: each slice's real, hidden-golden verdict is exactly what a
  # full serial run would have found for those same steps.
  #
  # These only matter when run_benchmark is true -- the run_benchmark=false
  # (correctness-only, no timed benchmark) path keeps its original single-
  # machine "Correctness" step below, unsplit.
  correctness-slice-1:
    name: "correctness slice 1 (${{ inputs.range_1 }})"
    needs: validate-slice-ranges
    if: ${{ inputs.run_benchmark && needs.validate-slice-ranges.result == 'success' }}
    uses: ./.github/workflows/benchmark-correctness-slice.yml
    secrets: inherit
    with:
      slice_name: machine2
      step_range: ${{ inputs.range_1 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  correctness-slice-2:
    name: "correctness slice 2 (${{ inputs.range_2 }})"
    needs: validate-slice-ranges
    if: ${{ inputs.run_benchmark && needs.validate-slice-ranges.result == 'success' }}
    uses: ./.github/workflows/benchmark-correctness-slice.yml
    secrets: inherit
    with:
      slice_name: machine3
      step_range: ${{ inputs.range_2 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  correctness-slice-3:
    name: "correctness slice 3 (${{ inputs.range_3 }})"
    needs: validate-slice-ranges
    if: ${{ inputs.run_benchmark && needs.validate-slice-ranges.result == 'success' }}
    uses: ./.github/workflows/benchmark-correctness-slice.yml
    secrets: inherit
    with:
      slice_name: machine4
      step_range: ${{ inputs.range_3 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  # Only handles run_benchmark=false (correctness-only, no timed benchmark, no
  # split): a single machine checking the public-or-private golden's base case
  # unsplit. When run_benchmark=true, benchmark-timing/benchmark-gates below
  # replace this entirely -- there is no serial single-machine path left for
  # that mode.
  correctness-only:
    if: ${{ !inputs.run_benchmark }}
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 720
    environment: benchmark-private-prompts
    env:
      MLXFAST_PRIVATE_DIR: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}
      MLXFAST_CORRECTNESS_GOLDEN_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}/correctness_golden.json
      MLXFAST_ARTIFACT_ROOT: /tmp/mlxfast-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
      MLXFAST_OFFICIAL_BENCHMARK_RUN: "1"
      # Submission branches run untrusted editable code; gate the modifiable
      # surface + static cheat review on them and suppress submitted-process logs.
      MLXFAST_IS_SUBMISSION_BRANCH: ${{ (startsWith(github.ref_name, 'submissions/')) && '1' || '0' }}
      MLXFAST_PRIVATE_PROMPTS_R2_PRESENT: ${{ (secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_BUCKET_ENDPOINT != '' && secrets.R2_SECRET_ACCESS_KEY != '') && '1' || '0' }}
      MLXFAST_PUBLIC_CORRECTNESS_PROMPT_PATH: correctness_prompts/public_longcopy_gate_english_512.txt
      MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH: correctness_prompts/public_longcopy_gate_english_512_256.json
      MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_SHA256: 2a747bf797e16d58f5ffedacc0d4bf5ce0d14be00f2421dc04289a2154cb011d
      MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_BYTES: "10320"
      MLXFAST_CORRECTNESS_GOLDEN_R2_PATH: correctness_prompts/golden_prompt_benchmark_transcription_gate_english_512_256.json
      MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256: 830670206859a1b221508ae44a031205a3eba6f5f13e05b40383bf781bdbf067
      MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES: "26110"
      MLXFAST_EXPECTED_CORRECTNESS_STEPS: "64"
      MLXFAST_REFERENCE_MANIFEST_PATH: fixtures/reference_deepseek_v4_flash_4bit.sha256
      MLXFAST_REFERENCE_DIR: .cache/huggingface/hub/models--mlx-community--DeepSeek-V4-Flash-4bit/snapshots/main
      # Benchmark whatever ref is dispatched; enforce-trusted still pins repo +
      # workflow_dispatch. Submission branches are bot-created and differ from
      # main only in editablePaths (re-verified by the modifiable-surface step).
      MLXFAST_TRUSTED_BENCHMARK_REF: ${{ github.ref }}
      MLXFAST_VERIFY_TRANSFORM: ${{ inputs.verify_transform && '1' || '0' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce trusted workflow context
        run: .github/scripts/enforce-trusted-benchmark-workflow.sh

      - name: Review submitted code for benchmark bypasses
        if: ${{ startsWith(github.ref_name, 'submissions/') }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ORG_ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          .github/scripts/run-submission-static-review.sh

      - name: Enforce modifiable surface
        if: ${{ startsWith(github.ref_name, 'submissions/') }}
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")" \
            .github/scripts/enforce-modifiable-surface.sh

      - name: Probe runtime worker sandbox
        run: .github/scripts/probe-runtime-worker-sandbox.sh

      - name: Check correctness golden source
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${MLXFAST_CORRECTNESS_GOLDEN_PATH}")"
          test -s "${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH}"
          test -s "${MLXFAST_PUBLIC_CORRECTNESS_PROMPT_PATH}"
          echo "benchmark: using checked-in public correctness golden"

      - name: Restore SwiftPM cache
        id: restore_swiftpm_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Swift harness and reference checkpoint
        env:
          MLXFAST_REFERENCE_BASE_URL: ${{ secrets.MLXFAST_REFERENCE_BASE_URL || 'https://ds4.darkbloom.ai/deepseek-v4-flash-4bit' }}
          MLXFAST_REFERENCE_AUTH_HEADER: ${{ secrets.MLXFAST_REFERENCE_AUTH_HEADER }}
          MLXFAST_REFERENCE_DOWNLOAD_JOBS: ${{ inputs.reference_download_jobs }}
          MLXFAST_REFERENCE_MIN_FREE_GIB: ${{ inputs.reference_min_free_gib }}
          MLXFAST_REFERENCE_POST_DOWNLOAD_FULL_VERIFY: "0"
        run: ./setup.sh

      - name: Save SwiftPM cache
        if: ${{ steps.restore_swiftpm_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: ${{ steps.restore_swiftpm_cache.outputs.cache-primary-key }}

      - name: Transform reference checkpoint
        run: |
          set -euo pipefail
          mkdir -p weights
          MLXFAST_OFFLINE_WRITABLE_PATHS="${PWD}/weights" \
            .github/scripts/run-offline.sh .build/release/mlxfast-swift transform \
            --reference "${MLXFAST_REFERENCE_DIR}" \
            --output weights

      - name: Prepare correctness golden
        id: prepare-correctness-golden
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_ENDPOINT: ${{ secrets.R2_BUCKET_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          echo "benchmark: using checked-in public correctness golden"
          cp "${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH}" "${MLXFAST_CORRECTNESS_GOLDEN_PATH}"
          export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256="${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_SHA256}"
          export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES="${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_BYTES}"
          {
            echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256=${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_SHA256}"
            echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES=${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_BYTES}"
          } >> "${GITHUB_ENV}"
          .github/scripts/verify-correctness-golden.sh

      - name: Correctness
        run: |
          set -euo pipefail
          if [[ "${MLXFAST_IS_SUBMISSION_BRANCH}" == "1" ]]; then
            echo "benchmark: running submitted correctness with private process logs suppressed"
            started="${SECONDS}"
            .build/release/mlxfast-swift correctness \
              --weights weights \
              --golden "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
              > correctness-report.json \
              2> "${RUNNER_TEMP}/mlxfast-correctness-private.log" &
            pid="$!"
            while kill -0 "${pid}" 2>/dev/null; do
              sleep 60
              if kill -0 "${pid}" 2>/dev/null; then
                echo "benchmark: submitted correctness still running elapsed=$((SECONDS - started))s"
              fi
            done
            wait "${pid}"
          else
            .build/release/mlxfast-swift correctness \
              --weights weights \
              --golden "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
              > correctness-report.json
          fi

      - name: Validate correctness artifacts
        id: validate_correctness_artifacts
        if: always() && !inputs.run_benchmark
        run: |
          set -euo pipefail
          test -s correctness-report.json
          jq -e \
            --arg golden_hash "${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256}" \
            --argjson checked_steps "${MLXFAST_EXPECTED_CORRECTNESS_CHECKED_STEPS}" \
            --argjson correctness_cases "${MLXFAST_EXPECTED_CORRECTNESS_CASES}" \
            '
            def same_keys($expected):
              (keys_unsorted | sort) == ($expected | sort);

            same_keys([
              "actual_token",
              "case_count",
              "checked_steps",
              "error",
              "expected_token",
              "expert_bytes_read",
              "expert_cache_evictions",
              "expert_cache_hits",
              "expert_cache_misses",
              "expert_hit_rate",
              "expert_peak_cached_tensors",
              "expert_read_seconds",
              "first_failing_case",
              "first_failing_step",
              "golden_hash",
              "passed"
            ])
            and .passed == true
            and .checked_steps == $checked_steps
            and .case_count == $correctness_cases
            and .golden_hash == $golden_hash
            and .error == ""
            and .first_failing_case == null
            and .first_failing_step == null
            and .expected_token == null
            and .actual_token == null
            ' \
            correctness-report.json >/dev/null

      - name: Check correctness artifact paths
        if: ${{ always() && ((!(startsWith(github.ref_name, 'submissions/'))) || steps.validate_correctness_artifacts.outcome == 'success') }}
        run: |
          set -euo pipefail
          .github/scripts/deny-private-artifacts.sh \
            correctness-report.json \
            "${MLXFAST_CORRECTNESS_GOLDEN_PATH}.sha256" \
            "${MLXFAST_CORRECTNESS_GOLDEN_PATH}.bytes"

      - name: Stage correctness artifacts
        id: stage_correctness_artifacts
        if: ${{ always() && ((!(startsWith(github.ref_name, 'submissions/'))) || steps.validate_correctness_artifacts.outcome == 'success') }}
        run: |
          set -euo pipefail
          .github/scripts/stage-benchmark-artifacts.sh \
            "${MLXFAST_ARTIFACT_ROOT}/correctness-results" \
            correctness-report.json=correctness-report.json \
            golden.sha256="${MLXFAST_CORRECTNESS_GOLDEN_PATH}.sha256" \
            golden.bytes="${MLXFAST_CORRECTNESS_GOLDEN_PATH}.bytes"

      - name: Upload correctness artifacts
        if: always() && steps.stage_correctness_artifacts.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: correctness-results-${{ github.run_id }}
          path: ${{ env.MLXFAST_ARTIFACT_ROOT }}/correctness-results
          if-no-files-found: error

  # Timed benchmark, gates/GPQA, and the base correctness case now each run on
  # their own independent machine. Splitting the base case alone (correctness-
  # slice-1/2/3) only saved a fraction of the original serial time: the anchor/
  # free-run/behavior/GPQA gates turned out to dominate "correctness_seconds",
  # not the base case, so they needed their own machine too to meaningfully cut
  # wall-clock time. See BenchmarkOptions.checkGates/skipTimedBenchmark for the
  # harness-level mechanism.
  #
  # Parity note: in the serial run the gates/GPQA/semantic-judge checks ran
  # AFTER the timed benchmark and were short-circuited if the speedup floors
  # already failed. Here they run on their own machine unconditionally (there
  # is no timing result to short-circuit on), so gates always execute even when
  # timing fails. The final verdict is identical -- combine ANDs both machines'
  # pass/fail -- this only removes an ordering side channel and costs one extra
  # gates run on an already-failing submission.
  # Gate timing/gates on validate-slice-ranges too, not just the slices: a bad
  # range_1/2/3 dooms the whole run (combine's coverage check fails), so failing
  # the cheap validator in ~3s must stop ALL five expensive machines, not only
  # the three slices -- otherwise a typo still burns these two Blacksmith jobs.
  # (timing/gates don't consume the ranges themselves, but there is no point
  # running them for a run that cannot combine.)
  benchmark-timing:
    name: "benchmark timing (no gates)"
    needs: validate-slice-ranges
    if: ${{ inputs.run_benchmark && needs.validate-slice-ranges.result == 'success' }}
    uses: ./.github/workflows/benchmark-timing-or-gates.yml
    secrets: inherit
    with:
      mode: timing
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}
      verify_transform: ${{ inputs.verify_transform }}

  benchmark-gates:
    name: "benchmark gates (no timing)"
    needs: validate-slice-ranges
    if: ${{ inputs.run_benchmark && needs.validate-slice-ranges.result == 'success' }}
    uses: ./.github/workflows/benchmark-timing-or-gates.yml
    secrets: inherit
    with:
      mode: gates
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}
      verify_transform: ${{ inputs.verify_transform }}

  # ANDs the three real correctness-slice verdicts and the gates machine's own
  # verdict, and overlays the timing machine's real prefill/decode numbers, into
  # the one final, published score. This job touches no repo credentials -- it
  # only ever reads the already-computed, already-authenticated outputs the
  # jobs above produced, so it deliberately has no environment: gate.
  combine:
    name: combine
    if: ${{ always() && inputs.run_benchmark }}
    needs:
      [
        correctness-slice-1,
        correctness-slice-2,
        correctness-slice-3,
        benchmark-timing,
        benchmark-gates,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MLXFAST_EXPECTED_CORRECTNESS_STEPS: "64"
      MLXFAST_ARTIFACT_ROOT: /tmp/mlxfast-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      # combine runs with if: always() so it can report a clear verdict even
      # when an upstream machine fails, but without this check a failed
      # upstream job (e.g. a real hidden-correctness failure on a slice) would
      # only surface once the download/merge steps below hit a missing
      # artifact directory, as an opaque "No such file or directory".
      - name: Check upstream jobs succeeded
        env:
          SLICE_1_RESULT: ${{ needs.correctness-slice-1.result }}
          SLICE_2_RESULT: ${{ needs.correctness-slice-2.result }}
          SLICE_3_RESULT: ${{ needs.correctness-slice-3.result }}
          TIMING_RESULT: ${{ needs.benchmark-timing.result }}
          GATES_RESULT: ${{ needs.benchmark-gates.result }}
        run: |
          set -euo pipefail
          status=0
          for pair in \
            "correctness-slice-1=${SLICE_1_RESULT}" \
            "correctness-slice-2=${SLICE_2_RESULT}" \
            "correctness-slice-3=${SLICE_3_RESULT}" \
            "benchmark-timing=${TIMING_RESULT}" \
            "benchmark-gates=${GATES_RESULT}"; do
            name="${pair%%=*}"
            result="${pair#*=}"
            if [[ "${result}" != "success" ]]; then
              echo "::error::combine: upstream job ${name} did not succeed (result=${result})"
              status=1
            fi
          done
          exit "${status}"

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download parallel benchmark artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: benchmark-parallel-${{ github.run_id }}-${{ github.run_attempt }}-*
          path: slices
          merge-multiple: false

      - name: Merge gates and timing into machine1
        # combine-parallel-correctness.sh expects one "machine1" payload with a
        # real correctness/gates verdict AND real timing numbers. The gates
        # machine's own score.json already has the real gates/GPQA verdict (its
        # timing fields are baseline placeholders -- see BenchmarkOptions'
        # skipTimedBenchmark comment for why baseline, not zero); overlay the
        # timing machine's real prefill/decode/speedup numbers on top of it.
        run: |
          set -euo pipefail
          mkdir -p machine1
          gates_dir="slices/benchmark-parallel-${{ github.run_id }}-${{ github.run_attempt }}-gates"
          timing_dir="slices/benchmark-parallel-${{ github.run_id }}-${{ github.run_attempt }}-timing"

          # This is one half of the full 5-way weights-hash guarantee: machine1
          # below is a COPY of gates_hash (see "cp ... machine1/weights.sha256"),
          # so combine-parallel-correctness.sh's own machine1-vs-machine2/3/4
          # loop never actually touches timing_hash. This check is what makes
          # "gates == machine1 == machine2 == machine3 == machine4" transitively
          # include timing too -- do not remove it without adding a direct
          # timing-vs-slices comparison elsewhere. This 5-way byte-equality is
          # ALSO the substitute for verify_transform on the slice machines: the
          # slices never re-run mlxfast-swift verify-transform (only timing/gates
          # do, via benchmark.sh), but a verified timing/gates tree plus this
          # hash equality proves the slice trees are byte-identical to it.
          gates_hash="$(cat "${gates_dir}/weights.sha256")"
          timing_hash="$(cat "${timing_dir}/weights.sha256")"
          if [[ "${gates_hash}" != "${timing_hash}" ]]; then
            echo "::error::gates machine weights hash (${gates_hash}) does not match timing machine's (${timing_hash})" >&2
            exit 1
          fi

          # Defense-in-depth, not the primary guard: benchmark-timing-or-gates.yml's
          # own "Validate intermediate benchmark artifact" step already blocks a
          # failing gates score.json from ever being uploaded (on submission
          # branches), and combine's "Check upstream jobs succeeded" step already
          # fails the whole run if that job's own exit code was nonzero. This is a
          # second checkpoint in case those two ever disagree (e.g. benchmark.sh's
          # own pass/fail exit code diverges from the metrics' null-ness) so a
          # regression there doesn't silently merge hidden-adjacent content into
          # the published combined score.
          jq -e '
            .passed == true
            and .metrics.error == ""
            and .metrics.first_failing_case == null
            and .metrics.first_failing_layer == null
            and .metrics.first_failing_step == null
            and .metrics.expected_token == null
            and .metrics.actual_token == null
          ' "${gates_dir}/score.json" >/dev/null || {
            echo "::error::gates machine score.json failed the pre-merge leak-field check" >&2
            exit 1
          }

          # The expert_* sums below reproduce the serial run's timed-phase-only
          # semantics ONLY because the gates machine (skipTimedBenchmark) reports
          # structural zeros for all of them. If the gates machine ever starts
          # reporting nonzero expert stats (e.g. a future change folds its
          # correctness-phase reads into the published score), summing would
          # silently double-count relative to serial -- fail loudly instead.
          jq -e '
            .metrics.expert_bytes_read == 0
            and .metrics.expert_cache_hits == 0
            and .metrics.expert_cache_misses == 0
            and .metrics.expert_cache_evictions == 0
            and .metrics.expert_read_seconds == 0
            and .metrics.expert_peak_cached_tensors == 0
          ' "${gates_dir}/score.json" >/dev/null || {
            echo "::error::gates machine score.json reports nonzero expert stats; the merge sums gates+timing and would double-count -- update the merge semantics before allowing this" >&2
            exit 1
          }

          # Base $g (gates) and only overlay the timing-specific fields below.
          # Provenance of the fields NOT overlaid from $t, versus the serial run:
          #  - preflight_seconds, timestamp: gates-machine only (both machines
          #    run an equivalent cheap preflight; the difference is diagnostic).
          #  - correctness_seconds: starts as $g's gates-only value here and is
          #    COMPLETED downstream -- combine-parallel-correctness.sh adds the
          #    three slices' base-case seconds back in, restoring the serial
          #    "base case + gates" total.
          #  - benchmark_wall_seconds, peak_ram_gb, process_resident_memory_gb,
          #    expert_peak_cached_tensors: max() across the two machines (a
          #    single serial process reported one number; the cross-machine max
          #    is the closest faithful aggregate and is diagnostic, not scored).
          #  - expert_* counters: summed (gates contributes structural zeros,
          #    asserted above), reproducing the serial timed-phase totals.
          jq -n \
            --slurpfile gates "${gates_dir}/score.json" \
            --slurpfile timing "${timing_dir}/score.json" \
            '
            ($gates[0]) as $g | ($timing[0]) as $t
            | $g
            | .passed = (.passed and $t.passed)
            | .score = $t.score
            | .metrics.decode_seconds_per_token = $t.metrics.decode_seconds_per_token
            | .metrics.prefill_seconds_per_token = $t.metrics.prefill_seconds_per_token
            | .metrics.decode_speedup = $t.metrics.decode_speedup
            | .metrics.prefill_speedup = $t.metrics.prefill_speedup
            | .metrics.decode_speedup_floor = $t.metrics.decode_speedup_floor
            | .metrics.prefill_speedup_floor = $t.metrics.prefill_speedup_floor
            | .metrics.passed_decode_speedup_floor = $t.metrics.passed_decode_speedup_floor
            | .metrics.passed_prefill_speedup_floor = $t.metrics.passed_prefill_speedup_floor
            | .metrics.baseline_decode_seconds_per_token = $t.metrics.baseline_decode_seconds_per_token
            | .metrics.baseline_prefill_seconds_per_token = $t.metrics.baseline_prefill_seconds_per_token
            | .metrics.timed_benchmark_seconds = $t.metrics.timed_benchmark_seconds
            | .metrics.bandwidth_gb_per_token = $t.metrics.bandwidth_gb_per_token
            | .metrics.bandwidth_source = $t.metrics.bandwidth_source
            | .metrics.benchmark_wall_seconds = ([.metrics.benchmark_wall_seconds, $t.metrics.benchmark_wall_seconds] | max)
            | .metrics.expert_bytes_read = (.metrics.expert_bytes_read + $t.metrics.expert_bytes_read)
            | .metrics.expert_cache_hits = (.metrics.expert_cache_hits + $t.metrics.expert_cache_hits)
            | .metrics.expert_cache_misses = (.metrics.expert_cache_misses + $t.metrics.expert_cache_misses)
            | .metrics.expert_cache_evictions = (.metrics.expert_cache_evictions + $t.metrics.expert_cache_evictions)
            | .metrics.expert_read_seconds = (.metrics.expert_read_seconds + $t.metrics.expert_read_seconds)
            | .metrics.expert_peak_cached_tensors = ([.metrics.expert_peak_cached_tensors, $t.metrics.expert_peak_cached_tensors] | max)
            | .metrics.expert_hit_rate = (
                if (.metrics.expert_cache_hits + .metrics.expert_cache_misses) > 0
                then .metrics.expert_cache_hits / (.metrics.expert_cache_hits + .metrics.expert_cache_misses)
                else 0
                end
              )
            | .metrics.peak_ram_gb = ([.metrics.peak_ram_gb, $t.metrics.peak_ram_gb] | max)
            | .metrics.process_resident_memory_gb = ([.metrics.process_resident_memory_gb, $t.metrics.process_resident_memory_gb] | max)
            | .metrics.partial_result = false
            ' > machine1/score.json

          cp "${gates_dir}/weights.sha256" machine1/weights.sha256
          cat "${gates_dir}/golden-expectations.env" >> "${GITHUB_ENV}"

      - name: Assemble machine directories
        run: |
          set -euo pipefail
          mkdir -p machine2 machine3 machine4
          cp "slices/benchmark-parallel-${{ github.run_id }}-${{ github.run_attempt }}-machine2/"* machine2/
          cp "slices/benchmark-parallel-${{ github.run_id }}-${{ github.run_attempt }}-machine3/"* machine3/
          cp "slices/benchmark-parallel-${{ github.run_id }}-${{ github.run_attempt }}-machine4/"* machine4/

      - name: Combine
        env:
          MLXFAST_CORRECTNESS_MACHINE_DIRS: "machine2 machine3 machine4"
          MLXFAST_COMBINED_SCORE_PATH: score.combined.json
        run: .github/scripts/combine-parallel-correctness.sh

      - name: Finalize combined score and integrity
        # combine-parallel-correctness.sh only overwrites the correctness
        # fields inside score.combined.json, and the merge step before it
        # overlaid timing fields too, so the hash differs from what the gates
        # machine's own benchmark-integrity.json recorded -- recompute and
        # patch score_sha256 so the integrity cross-check below matches the
        # artifact that actually gets published, not the pre-merge one.
        run: |
          set -euo pipefail
          test -s score.combined.json
          score_hash="$(shasum -a 256 score.combined.json | awk '{print $1}')"
          printf '%s  %s\n' "${score_hash}" score.combined.json > score.combined.json.sha256
          jq --arg hash "${score_hash}" '.score_sha256 = $hash' \
            "slices/benchmark-parallel-${{ github.run_id }}-${{ github.run_attempt }}-gates/benchmark-integrity.json" \
            > benchmark-integrity.json
          printf '%s  correctness_golden.json\n' "${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256}" > correctness_golden.json.sha256
          printf '%s  correctness_golden.json\n' "${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES}" > correctness_golden.json.bytes

      - name: Validate combined benchmark artifacts
        id: validate_benchmark_artifacts
        env:
          MLXFAST_SCORE_PATH: score.combined.json
          MLXFAST_CORRECTNESS_GOLDEN_PATH: correctness_golden.json
          MLXFAST_GPQA_TTFT_CASE_COUNT: "5"
          MLXFAST_SEMANTIC_GPQA_CASE_COUNT: "5"
          MLXFAST_SEMANTIC_GPQA_MIN_PASS: "3"
          MLXFAST_SEMANTIC_GPQA_REQUIRED: "1"
        run: .github/scripts/validate-benchmark-artifacts.sh

      - name: Check combined benchmark artifact paths
        if: steps.validate_benchmark_artifacts.outcome == 'success'
        run: |
          set -euo pipefail
          .github/scripts/deny-private-artifacts.sh \
            correctness_golden.json.sha256 \
            correctness_golden.json.bytes \
            score.combined.json \
            score.combined.json.sha256 \
            benchmark-integrity.json

      - name: Stage combined benchmark artifacts
        id: stage_benchmark_artifacts
        if: steps.validate_benchmark_artifacts.outcome == 'success'
        run: |
          set -euo pipefail
          .github/scripts/stage-benchmark-artifacts.sh \
            "${MLXFAST_ARTIFACT_ROOT}/benchmark-results" \
            golden.sha256=correctness_golden.json.sha256 \
            golden.bytes=correctness_golden.json.bytes \
            score.json=score.combined.json \
            score.sha256=score.combined.json.sha256 \
            benchmark-integrity.json=benchmark-integrity.json

      - name: Upload benchmark artifacts
        if: steps.stage_benchmark_artifacts.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: benchmark-results-${{ github.run_id }}
          path: ${{ env.MLXFAST_ARTIFACT_ROOT }}/benchmark-results
          if-no-files-found: error
