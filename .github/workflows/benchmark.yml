name: benchmark

# Runs for: fork PRs (self-serve scoring), pushes to main (post-promotion re-validation),
# and workflow_dispatch (Yukon dispatches on yukon/baseline/* and yukon/submissions/*
# branches it constructs, then reads the score from the uploaded artifact).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    # MLX requires Apple Silicon; the baseline peaks at ~27 GB RAM, so the
    # 48 GB tier is the smallest Blacksmith Mac that fits.
    runs-on: blacksmith-12vcpu-macos-latest
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the modifiable-surface guard can diff against the base.
          fetch-depth: 0

      # Participant submissions come from forks; same-repo PRs are maintainers
      # and may touch the harness/CI, so the guard only polices fork PRs.
      - name: Enforce modifiable surface (fork PRs)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: .github/scripts/enforce-modifiable-surface.sh

      # Yukon already enforces editablePaths server-side when it builds candidate
      # branches; re-checking here is defense in depth against orchestrator bugs.
      - name: Enforce modifiable surface (yukon candidate branches)
        if: github.event_name == 'workflow_dispatch' && startsWith(github.ref_name, 'yukon/submissions/')
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")" \
            .github/scripts/enforce-modifiable-surface.sh

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # Blacksmith transparently serves actions/cache from colocated storage.
      # The reference checkpoint never changes, so the key is static.
      - name: Cache reference weights (~18 GB)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: quantizationfail/reference_weights
          key: reference-weights-gemma-4-26B-A4B-it-qat-4bit-v1

      - name: Cache pip downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      # Online phase: installs the venv and, only on a weights cache miss,
      # downloads the reference checkpoint (`quantizationfail weights` is idempotent).
      - name: Setup
        run: ./setup.sh

      # Offline phase: benchmark.sh self-sandboxes — it proves the Seatbelt
      # profile (tools/deny-network.sb) blocks egress, then re-execs itself
      # under sandbox-exec with no network and no sudo.
      - name: Benchmark (offline)
        env:
          QUANTIZATIONFAIL_NOTE: "ci ${{ github.event_name }} ${{ github.sha }}"
        run: ./benchmark.sh

      - name: Upload score artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            score.json
            results.tsv
          if-no-files-found: ignore

      # Fork PRs get a read-only token, so the comment is best-effort and
      # same-repo only; the step summary and artifact carry the score everywhere.
      - name: Comment score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/comment-score.sh
