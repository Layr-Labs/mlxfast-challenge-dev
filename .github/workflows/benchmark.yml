name: benchmark

# Dispatch-only: maintainers or the benchmark orchestrator start the expensive
# Apple Silicon run explicitly. No PR/push triggers should burn macOS minutes.
#
# The workflow benchmarks whatever ref it is dispatched on. The Yukon eigenbot
# creates submission branches (submissions/*) that differ from main only in
# benchmark.json editablePaths, so running them directly is safe: submission-branch
# runs still enforce the modifiable surface and the static cheat review, and
# suppress submitted-process logs.
on:
  workflow_dispatch:
    inputs:
      reference_download_jobs:
        description: "Parallel shard downloads for setup.sh."
        required: false
        default: "12"
        type: string
      reference_min_free_gib:
        description: "Minimum free GiB required before reference checkpoint download."
        required: false
        default: "170"
        type: string
      verify_transform:
        description: "Run deterministic transform verification before timing."
        required: false
        default: false
        type: boolean
      run_benchmark:
        description: "Run the timed benchmark after the correctness gate."
        required: false
        default: true
        type: boolean
      range_1:
        description: "Base-case step range for correctness slice 1, as START-END (half-open). Only used when run_benchmark is true."
        required: false
        default: "0-21"
        type: string
      range_2:
        description: "Base-case step range for correctness slice 2, as START-END (half-open). Only used when run_benchmark is true."
        required: false
        default: "21-42"
        type: string
      range_3:
        description: "Base-case step range for correctness slice 3, as START-END (half-open). Only used when run_benchmark is true."
        required: false
        default: "42-64"
        type: string
permissions:
  contents: read

jobs:
  # The base correctness case (64 teacher-forced steps) is checked in parallel,
  # in three slices, on three independent machines -- not serially inside the
  # benchmark job. Teacher-forced checking always feeds the GOLDEN token (never
  # the model's own prediction) as input to the next step, so a slice's verdict
  # is independent of what happens outside its range as long as it seeds its
  # context with the golden prefix up to its start step, which
  # compareTeacherForcedWithWorker already does. This is why splitting is sound,
  # not just fast: each slice's real, hidden-golden verdict is exactly what a
  # full serial run would have found for those same steps.
  #
  # These only matter when run_benchmark is true -- the run_benchmark=false
  # (correctness-only, no timed benchmark) path keeps its original single-
  # machine "Correctness" step below, unsplit.
  correctness-slice-1:
    name: "correctness slice 1 (${{ inputs.range_1 }})"
    if: ${{ inputs.run_benchmark }}
    uses: ./.github/workflows/benchmark-correctness-slice.yml
    secrets: inherit
    with:
      slice_name: machine2
      step_range: ${{ inputs.range_1 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  correctness-slice-2:
    name: "correctness slice 2 (${{ inputs.range_2 }})"
    if: ${{ inputs.run_benchmark }}
    uses: ./.github/workflows/benchmark-correctness-slice.yml
    secrets: inherit
    with:
      slice_name: machine3
      step_range: ${{ inputs.range_2 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  correctness-slice-3:
    name: "correctness slice 3 (${{ inputs.range_3 }})"
    if: ${{ inputs.run_benchmark }}
    uses: ./.github/workflows/benchmark-correctness-slice.yml
    secrets: inherit
    with:
      slice_name: machine4
      step_range: ${{ inputs.range_3 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  benchmark:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 720
    environment: benchmark-private-prompts
    env:
      MLXFAST_PRIVATE_DIR: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}
      MLXFAST_CORRECTNESS_GOLDEN_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}/correctness_golden.json
      MLXFAST_GPQA_REFERENCE_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}/gpqa_reference_cases.json
      MLXFAST_SEMANTIC_GPQA_OUTPUT_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}/semantic_gpqa_answers.json
      MLXFAST_SEMANTIC_GPQA_RESULTS_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}/semantic_gpqa_results.json
      MLXFAST_SUBMISSION_STATIC_REVIEW_RESULTS_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}/submission_static_review.json
      MLXFAST_ARTIFACT_ROOT: /tmp/mlxfast-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
      MLXFAST_OFFICIAL_BENCHMARK_RUN: "1"
      # Submission branches run untrusted editable code; gate the modifiable
      # surface + static cheat review on them and suppress submitted-process logs.
      MLXFAST_IS_SUBMISSION_BRANCH: ${{ (startsWith(github.ref_name, 'submissions/')) && '1' || '0' }}
      MLXFAST_PRIVATE_PROMPTS_R2_PRESENT: ${{ (secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_BUCKET_ENDPOINT != '' && secrets.R2_SECRET_ACCESS_KEY != '') && '1' || '0' }}
      MLXFAST_ANTHROPIC_PRESENT: ${{ secrets.ORG_ANTHROPIC_API_KEY != '' && '1' || '0' }}
      MLXFAST_RUN_BENCHMARK: ${{ inputs.run_benchmark && '1' || '0' }}
      MLXFAST_PUBLIC_CORRECTNESS_PROMPT_PATH: correctness_prompts/public_longcopy_gate_english_512.txt
      MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH: correctness_prompts/public_longcopy_gate_english_512_256.json
      MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_SHA256: 2a747bf797e16d58f5ffedacc0d4bf5ce0d14be00f2421dc04289a2154cb011d
      MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_BYTES: "10320"
      MLXFAST_CORRECTNESS_GOLDEN_R2_PATH: correctness_prompts/golden_prompt_benchmark_transcription_gate_english_512_256.json
      MLXFAST_GPQA_R2_PATH: correctness_prompts/gpqa_reference_cases.json
      MLXFAST_GPQA_CASE_COUNT: "5"
      MLXFAST_GPQA_MAX_NEW_TOKENS: "10"
      MLXFAST_GPQA_TTFT_CASE_COUNT: "5"
      MLXFAST_SEMANTIC_GPQA_CASE_COUNT: "5"
      MLXFAST_SEMANTIC_GPQA_MAX_NEW_TOKENS: "10"
      # Baseline DeepSeek V4 Flash currently passes 3/5 hidden short-answer
      # semantic GPQA judgments, so the hard gate is calibrated to preserve
      # baseline behavior rather than demand better-than-baseline GPQA quality.
      MLXFAST_SEMANTIC_GPQA_MIN_PASS: "3"
      MLXFAST_SEMANTIC_GPQA_REQUIRED: "1"
      MLXFAST_SEMANTIC_GPQA_MODEL: claude-sonnet-4-5-20250929
      MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256: 830670206859a1b221508ae44a031205a3eba6f5f13e05b40383bf781bdbf067
      MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES: "26110"
      MLXFAST_EXPECTED_CORRECTNESS_STEPS: "64"
      MLXFAST_REFERENCE_MANIFEST_PATH: fixtures/reference_deepseek_v4_flash_4bit.sha256
      MLXFAST_REFERENCE_DIR: .cache/huggingface/hub/models--mlx-community--DeepSeek-V4-Flash-4bit/snapshots/main
      # Benchmark whatever ref is dispatched; enforce-trusted still pins repo +
      # workflow_dispatch. Submission branches are bot-created and differ from
      # main only in editablePaths (re-verified by the modifiable-surface step).
      MLXFAST_TRUSTED_BENCHMARK_REF: ${{ github.ref }}
      MLXFAST_VERIFY_TRANSFORM: ${{ inputs.verify_transform && '1' || '0' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce trusted workflow context
        run: .github/scripts/enforce-trusted-benchmark-workflow.sh

      - name: Review submitted code for benchmark bypasses
        if: ${{ startsWith(github.ref_name, 'submissions/') }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ORG_ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          .github/scripts/run-submission-static-review.sh

      - name: Enforce modifiable surface
        if: ${{ startsWith(github.ref_name, 'submissions/') }}
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")" \
            .github/scripts/enforce-modifiable-surface.sh

      - name: Probe runtime worker sandbox
        run: .github/scripts/probe-runtime-worker-sandbox.sh

      - name: Check correctness golden source
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${MLXFAST_CORRECTNESS_GOLDEN_PATH}")"
          if [[ "${MLXFAST_RUN_BENCHMARK}" != "1" ]]; then
            test -s "${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH}"
            test -s "${MLXFAST_PUBLIC_CORRECTNESS_PROMPT_PATH}"
            echo "benchmark: using checked-in public correctness golden"
          elif [[ "${MLXFAST_PRIVATE_PROMPTS_R2_PRESENT}" == "1" ]]; then
            echo "benchmark: using precomputed R2 private correctness golden"
          else
            echo "benchmark: correctness golden requires private R2 secrets" >&2
            exit 1
          fi
          if [[ "${MLXFAST_RUN_BENCHMARK}" == "1" && "${MLXFAST_PRIVATE_PROMPTS_R2_PRESENT}" != "1" ]]; then
            echo "benchmark: hidden GPQA behavior gate requires private R2 secrets" >&2
            exit 1
          fi
          if [[ "${MLXFAST_RUN_BENCHMARK}" == "1" && "${MLXFAST_ANTHROPIC_PRESENT}" != "1" ]]; then
            echo "benchmark: semantic GPQA gate requires ORG_ANTHROPIC_API_KEY" >&2
            exit 1
          fi

      - name: Restore SwiftPM cache
        id: restore_swiftpm_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Swift harness and reference checkpoint
        env:
          MLXFAST_REFERENCE_BASE_URL: ${{ secrets.MLXFAST_REFERENCE_BASE_URL || 'https://ds4.darkbloom.ai/deepseek-v4-flash-4bit' }}
          MLXFAST_REFERENCE_AUTH_HEADER: ${{ secrets.MLXFAST_REFERENCE_AUTH_HEADER }}
          MLXFAST_REFERENCE_DOWNLOAD_JOBS: ${{ inputs.reference_download_jobs }}
          MLXFAST_REFERENCE_MIN_FREE_GIB: ${{ inputs.reference_min_free_gib }}
          MLXFAST_REFERENCE_POST_DOWNLOAD_FULL_VERIFY: "0"
        run: ./setup.sh

      - name: Save SwiftPM cache
        if: ${{ steps.restore_swiftpm_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: ${{ steps.restore_swiftpm_cache.outputs.cache-primary-key }}

      - name: Transform reference checkpoint
        run: |
          set -euo pipefail
          mkdir -p weights
          MLXFAST_OFFLINE_WRITABLE_PATHS="${PWD}/weights" \
            .github/scripts/run-offline.sh .build/release/mlxfast-swift transform \
            --reference "${MLXFAST_REFERENCE_DIR}" \
            --output weights

      - name: Prepare correctness golden
        id: prepare-correctness-golden
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_ENDPOINT: ${{ secrets.R2_BUCKET_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [[ "${MLXFAST_RUN_BENCHMARK}" != "1" ]]; then
            echo "benchmark: using checked-in public correctness golden"
            cp "${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH}" "${MLXFAST_CORRECTNESS_GOLDEN_PATH}"
            export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256="${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_SHA256}"
            export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES="${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_BYTES}"
            {
              echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256=${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_SHA256}"
              echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES=${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_BYTES}"
            } >> "${GITHUB_ENV}"
          elif [[ "${MLXFAST_PRIVATE_PROMPTS_R2_PRESENT}" == "1" ]]; then
            echo "benchmark: downloading precomputed R2 correctness_golden.json"
            .github/scripts/download-r2-object.sh \
              "${MLXFAST_CORRECTNESS_GOLDEN_R2_PATH}" \
              "${MLXFAST_CORRECTNESS_GOLDEN_PATH}"
          else
            echo "benchmark: correctness golden missing; configure private R2 correctness_golden.json" >&2
            exit 1
          fi
          if [[ "${MLXFAST_RUN_BENCHMARK}" == "1" ]]; then
            echo "benchmark: downloading precomputed R2 GPQA behavior cases"
            .github/scripts/download-r2-object.sh \
              "${MLXFAST_GPQA_R2_PATH}" \
              "${MLXFAST_GPQA_REFERENCE_PATH}"
            .build/release/mlxfast-swift attach-gpqa-gates \
              --golden "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
              --gpqa "${MLXFAST_GPQA_REFERENCE_PATH}" \
              --tokenizer weights \
              --output "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
              --case-count "${MLXFAST_GPQA_CASE_COUNT}" \
              --max-new-tokens "${MLXFAST_GPQA_MAX_NEW_TOKENS}"
            actual_hash="$(shasum -a 256 "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" | awk '{print $1}')"
            actual_bytes="$(wc -c < "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" | tr -d ' ')"
            export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256="${actual_hash}"
            export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES="${actual_bytes}"
            {
              echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256=${actual_hash}"
              echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES=${actual_bytes}"
            } >> "${GITHUB_ENV}"
            echo "benchmark: using private GPQA-augmented correctness golden ${actual_hash} bytes=${actual_bytes}"
          fi
          .github/scripts/verify-correctness-golden.sh

      - name: Correctness
        if: ${{ !inputs.run_benchmark }}
        run: |
          set -euo pipefail
          if [[ "${MLXFAST_IS_SUBMISSION_BRANCH}" == "1" ]]; then
            echo "benchmark: running submitted correctness with private process logs suppressed"
            started="${SECONDS}"
            .build/release/mlxfast-swift correctness \
              --weights weights \
              --golden "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
              > correctness-report.json \
              2> "${RUNNER_TEMP}/mlxfast-correctness-private.log" &
            pid="$!"
            while kill -0 "${pid}" 2>/dev/null; do
              sleep 60
              if kill -0 "${pid}" 2>/dev/null; then
                echo "benchmark: submitted correctness still running elapsed=$((SECONDS - started))s"
              fi
            done
            wait "${pid}"
          else
            .build/release/mlxfast-swift correctness \
              --weights weights \
              --golden "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
              > correctness-report.json
          fi

      - name: Validate correctness artifacts
        id: validate_correctness_artifacts
        if: always() && !inputs.run_benchmark
        run: |
          set -euo pipefail
          test -s correctness-report.json
          jq -e \
            --arg golden_hash "${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256}" \
            --argjson checked_steps "${MLXFAST_EXPECTED_CORRECTNESS_CHECKED_STEPS}" \
            --argjson correctness_cases "${MLXFAST_EXPECTED_CORRECTNESS_CASES}" \
            '
            def same_keys($expected):
              (keys_unsorted | sort) == ($expected | sort);

            same_keys([
              "actual_token",
              "case_count",
              "checked_steps",
              "error",
              "expected_token",
              "expert_bytes_read",
              "expert_cache_evictions",
              "expert_cache_hits",
              "expert_cache_misses",
              "expert_hit_rate",
              "expert_peak_cached_tensors",
              "expert_read_seconds",
              "first_failing_case",
              "first_failing_step",
              "golden_hash",
              "passed"
            ])
            and .passed == true
            and .checked_steps == $checked_steps
            and .case_count == $correctness_cases
            and .golden_hash == $golden_hash
            and .error == ""
            and .first_failing_case == null
            and .first_failing_step == null
            and .expected_token == null
            and .actual_token == null
            ' \
            correctness-report.json >/dev/null

      - name: Benchmark
        if: ${{ inputs.run_benchmark }}
        env:
          MLXFAST_NOTE: "ci ${{ github.event_name }} ${{ github.sha }}"
          MLXFAST_SKIP_TRANSFORM: "1"
          # The base correctness case is checked in parallel by correctness-
          # slice-1/2/3 above instead of here -- 0 means this machine skips only
          # its own base case; GPQA/free-run/behavior/anchors and the timed
          # benchmark still run normally. The combine job ANDs this machine's
          # own passed_correctness (trivially true, since nothing was checked)
          # with every slice's real verdict before anything is treated as final.
          MLXFAST_BENCHMARK_CORRECTNESS_STEPS: "0"
        run: |
          set -euo pipefail
          if [[ "${MLXFAST_IS_SUBMISSION_BRANCH}" == "1" ]]; then
            echo "benchmark: running submitted benchmark with private process logs suppressed"
            started="${SECONDS}"
            ./benchmark.sh > "${RUNNER_TEMP}/mlxfast-benchmark-private.log" 2>&1 &
            pid="$!"
            while kill -0 "${pid}" 2>/dev/null; do
              sleep 60
              if kill -0 "${pid}" 2>/dev/null; then
                echo "benchmark: submitted benchmark still running elapsed=$((SECONDS - started))s"
              fi
            done
            wait "${pid}"
          else
            ./benchmark.sh
          fi

      - name: Semantic GPQA gate
        if: ${{ inputs.run_benchmark }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ORG_ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "benchmark: semantic GPQA gate requires ORG_ANTHROPIC_API_KEY" >&2
            exit 1
          fi
          .github/scripts/run-semantic-gpqa-gate.sh

      - name: Hash transformed weights
        if: always() && inputs.run_benchmark
        run: .github/scripts/hash-weights-directory.sh weights weights.sha256

      - name: Prepare golden expectations for combine
        id: prepare_golden_expectations
        if: always() && inputs.run_benchmark
        run: |
          set -euo pipefail
          test -s score.json
          test -s benchmark-integrity.json
          {
            echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256=${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256}"
            echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES=${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES}"
            echo "MLXFAST_EXPECTED_CORRECTNESS_CHECKED_STEPS=${MLXFAST_EXPECTED_CORRECTNESS_CHECKED_STEPS}"
            echo "MLXFAST_EXPECTED_CORRECTNESS_CASES=${MLXFAST_EXPECTED_CORRECTNESS_CASES}"
          } > golden-expectations.env

      - name: Check intermediate benchmark artifact paths
        if: always() && inputs.run_benchmark && steps.prepare_golden_expectations.outcome == 'success'
        run: |
          set -euo pipefail
          .github/scripts/deny-private-artifacts.sh \
            score.json \
            benchmark-integrity.json \
            weights.sha256 \
            golden-expectations.env

      - name: Upload intermediate benchmark result
        # This machine's own score.json is NOT the final result: its
        # passed_correctness is trivially true (MLXFAST_BENCHMARK_CORRECTNESS_
        # STEPS=0 above means it checked none of the base case itself), and its
        # checked_steps excludes the ~64 base-case steps the correctness-slice-*
        # jobs are covering instead. The combine job downloads this alongside
        # every slice's real report and runs combine-parallel-correctness.sh to
        # produce the actual, final, validated score -- this upload is an
        # intermediate input to that job, not a publishable result on its own.
        if: always() && inputs.run_benchmark
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: benchmark-parallel-${{ github.run_id }}-machine1
          path: |
            score.json
            benchmark-integrity.json
            weights.sha256
            golden-expectations.env
          if-no-files-found: error
          retention-days: 7

      - name: Check correctness artifact paths
        if: ${{ always() && !inputs.run_benchmark && ((!(startsWith(github.ref_name, 'submissions/'))) || steps.validate_correctness_artifacts.outcome == 'success') }}
        run: |
          set -euo pipefail
          .github/scripts/deny-private-artifacts.sh \
            correctness-report.json \
            "${MLXFAST_CORRECTNESS_GOLDEN_PATH}.sha256" \
            "${MLXFAST_CORRECTNESS_GOLDEN_PATH}.bytes"

      - name: Stage correctness artifacts
        id: stage_correctness_artifacts
        if: ${{ always() && !inputs.run_benchmark && ((!(startsWith(github.ref_name, 'submissions/'))) || steps.validate_correctness_artifacts.outcome == 'success') }}
        run: |
          set -euo pipefail
          .github/scripts/stage-benchmark-artifacts.sh \
            "${MLXFAST_ARTIFACT_ROOT}/correctness-results" \
            correctness-report.json=correctness-report.json \
            golden.sha256="${MLXFAST_CORRECTNESS_GOLDEN_PATH}.sha256" \
            golden.bytes="${MLXFAST_CORRECTNESS_GOLDEN_PATH}.bytes"

      - name: Upload correctness artifacts
        if: always() && !inputs.run_benchmark && steps.stage_correctness_artifacts.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: correctness-results-${{ github.run_id }}
          path: ${{ env.MLXFAST_ARTIFACT_ROOT }}/correctness-results
          if-no-files-found: error

  # ANDs the three real correctness-slice verdicts and the benchmark-timing
  # machine's own (correctness-free) result into the one final, published
  # score. This job touches no repo credentials -- it only ever reads the
  # already-computed, already-authenticated outputs the jobs above produced,
  # so it deliberately has no environment: gate.
  combine:
    name: combine
    if: ${{ always() && inputs.run_benchmark }}
    needs:
      [correctness-slice-1, correctness-slice-2, correctness-slice-3, benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MLXFAST_EXPECTED_CORRECTNESS_STEPS: "64"
      MLXFAST_ARTIFACT_ROOT: /tmp/mlxfast-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download parallel benchmark artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: benchmark-parallel-${{ github.run_id }}-*
          path: slices
          merge-multiple: false

      - name: Assemble machine directories
        run: |
          set -euo pipefail
          mkdir -p machine1 machine2 machine3 machine4
          cp "slices/benchmark-parallel-${{ github.run_id }}-machine1/score.json" machine1/
          cp "slices/benchmark-parallel-${{ github.run_id }}-machine1/weights.sha256" machine1/
          cp "slices/benchmark-parallel-${{ github.run_id }}-machine2/"* machine2/
          cp "slices/benchmark-parallel-${{ github.run_id }}-machine3/"* machine3/
          cp "slices/benchmark-parallel-${{ github.run_id }}-machine4/"* machine4/
          cat "slices/benchmark-parallel-${{ github.run_id }}-machine1/golden-expectations.env" >> "${GITHUB_ENV}"

      - name: Combine
        env:
          MLXFAST_CORRECTNESS_MACHINE_DIRS: "machine2 machine3 machine4"
          MLXFAST_COMBINED_SCORE_PATH: score.combined.json
        run: .github/scripts/combine-parallel-correctness.sh

      - name: Finalize combined score and integrity
        # combine-parallel-correctness.sh only overwrites the correctness
        # fields inside score.combined.json, so its hash differs from what
        # machine1's own benchmark-integrity.json recorded -- recompute and
        # patch score_sha256 so the integrity cross-check below matches the
        # artifact that actually gets published, not the pre-combine one.
        run: |
          set -euo pipefail
          test -s score.combined.json
          score_hash="$(shasum -a 256 score.combined.json | awk '{print $1}')"
          printf '%s  %s\n' "${score_hash}" score.combined.json > score.combined.json.sha256
          jq --arg hash "${score_hash}" '.score_sha256 = $hash' \
            "slices/benchmark-parallel-${{ github.run_id }}-machine1/benchmark-integrity.json" \
            > benchmark-integrity.json
          printf '%s  correctness_golden.json\n' "${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256}" > correctness_golden.json.sha256
          printf '%s  correctness_golden.json\n' "${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES}" > correctness_golden.json.bytes

      - name: Validate combined benchmark artifacts
        id: validate_benchmark_artifacts
        env:
          MLXFAST_SCORE_PATH: score.combined.json
          MLXFAST_CORRECTNESS_GOLDEN_PATH: correctness_golden.json
          MLXFAST_GPQA_TTFT_CASE_COUNT: "5"
          MLXFAST_SEMANTIC_GPQA_CASE_COUNT: "5"
          MLXFAST_SEMANTIC_GPQA_MIN_PASS: "3"
          MLXFAST_SEMANTIC_GPQA_REQUIRED: "1"
        run: .github/scripts/validate-benchmark-artifacts.sh

      - name: Check combined benchmark artifact paths
        if: steps.validate_benchmark_artifacts.outcome == 'success'
        run: |
          set -euo pipefail
          .github/scripts/deny-private-artifacts.sh \
            correctness_golden.json.sha256 \
            correctness_golden.json.bytes \
            score.combined.json \
            score.combined.json.sha256 \
            benchmark-integrity.json

      - name: Stage combined benchmark artifacts
        id: stage_benchmark_artifacts
        if: steps.validate_benchmark_artifacts.outcome == 'success'
        run: |
          set -euo pipefail
          .github/scripts/stage-benchmark-artifacts.sh \
            "${MLXFAST_ARTIFACT_ROOT}/benchmark-results" \
            golden.sha256=correctness_golden.json.sha256 \
            golden.bytes=correctness_golden.json.bytes \
            score.json=score.combined.json \
            score.sha256=score.combined.json.sha256 \
            benchmark-integrity.json=benchmark-integrity.json

      - name: Upload benchmark artifacts
        if: steps.stage_benchmark_artifacts.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: benchmark-results-${{ github.run_id }}
          path: ${{ env.MLXFAST_ARTIFACT_ROOT }}/benchmark-results
          if-no-files-found: error
