name: benchmark

# OPERATOR DEBUG variant (branch-local, never merged to main): re-runs ONLY the
# timing machine for a failed submission run. Submitted-process logs stay
# suppressed exactly like a submissions/* run; instead of uploading artifacts,
# the job prints a REDACTED failure summary (no hidden-fixture token ids, no
# raw submitted-process output). See benchmark-timing-or-gates.yml on this
# branch for the report step.
on:
  workflow_dispatch:
    inputs:
      reference_download_jobs:
        description: "Parallel shard downloads for setup.sh."
        required: false
        default: "12"
        type: string
      reference_min_free_gib:
        description: "Minimum free GiB required before reference checkpoint download."
        required: false
        default: "170"
        type: string
      verify_transform:
        description: "Run deterministic transform verification before timing."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}-debug
  cancel-in-progress: false

jobs:
  benchmark-timing:
    name: "benchmark timing (no gates)"
    uses: ./.github/workflows/benchmark-timing-or-gates.yml
    secrets: inherit
    with:
      mode: timing
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}
      verify_transform: ${{ inputs.verify_transform }}
