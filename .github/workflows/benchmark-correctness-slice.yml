name: benchmark-correctness-slice

# Reusable job body, called only by benchmark.yml when parallel_correctness_split
# is enabled: one machine independently downloads and transforms the reference
# checkpoint, then checks a single --step-range slice of the REAL hidden base
# correctness case (not the public fixture -- that's parallel-correctness-
# probe-slice.yml's job), and uploads its report + assigned range + weights hash
# for benchmark.yml's combine job to verify and merge with combine-parallel-
# correctness.sh. Not meant to be dispatched on its own -- workflow_call only.
#
# Mirrors the trust/security steps in benchmark.yml's main job (trusted-workflow
# check, submission-branch static review + modifiable-surface enforcement,
# private-log suppression for submitted code) since this job independently runs
# the same submitted transform/correctness code on its own machine.
on:
  workflow_call:
    inputs:
      slice_name:
        required: true
        type: string
      step_range:
        required: true
        type: string
      reference_download_jobs:
        required: true
        type: string
      reference_min_free_gib:
        required: true
        type: string

permissions:
  contents: read

jobs:
  slice:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 360
    environment: benchmark-private-prompts
    env:
      MLXFAST_OFFICIAL_BENCHMARK_RUN: "1"
      MLXFAST_IS_SUBMISSION_BRANCH: ${{ (startsWith(github.ref_name, 'submissions/')) && '1' || '0' }}
      # Deny the whole private subtree (not just the golden literal) to the
      # sandboxed worker, matching the benchmark/gates/timing machines. The CLI's
      # writeRuntimeWorkerSandboxProfile adds a subpath deny for this dir.
      MLXFAST_PRIVATE_DIR: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.slice_name }}
      MLXFAST_CORRECTNESS_GOLDEN_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.slice_name }}/correctness_golden.json
      MLXFAST_CORRECTNESS_GOLDEN_R2_PATH: correctness_prompts/golden_prompt_benchmark_transcription_gate_english_512_256.json
      # The RAW (pre-GPQA-augmentation) hidden golden's expected hash/bytes --
      # --base-case-only skips anchors/free-run/behavior/GPQA entirely, so this
      # slice only ever needs the base case, never the GPQA-attached variant
      # benchmark.yml's own "benchmark" job downloads for itself.
      MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256: 830670206859a1b221508ae44a031205a3eba6f5f13e05b40383bf781bdbf067
      MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES: "26110"
      MLXFAST_EXPECTED_CORRECTNESS_STEPS: "64"
      MLXFAST_REFERENCE_MANIFEST_PATH: fixtures/reference_deepseek_v4_flash_4bit.sha256
      MLXFAST_REFERENCE_DIR: .cache/huggingface/hub/models--mlx-community--DeepSeek-V4-Flash-4bit/snapshots/main
      # Benchmark whatever ref is dispatched -- see the matching comment on
      # benchmark.yml's own MLXFAST_TRUSTED_BENCHMARK_REF.
      MLXFAST_TRUSTED_BENCHMARK_REF: ${{ github.ref }}
      # No MLXFAST_TRUSTED_BENCHMARK_WORKFLOW override needed: GITHUB_WORKFLOW_REF
      # for a workflow_call-invoked job reports the top-level DISPATCHED
      # workflow's own path (benchmark.yml), not this reusable callee's path --
      # confirmed empirically (an earlier version of this file guessed the
      # opposite and every slice failed with "unexpected workflow ref
      # .../benchmark.yml ... expected .../benchmark-correctness-slice.yml").
      # enforce-trusted-benchmark-workflow.sh's own default already matches.
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce trusted workflow context
        run: .github/scripts/enforce-trusted-benchmark-workflow.sh

      - name: Review submitted code for benchmark bypasses
        if: ${{ startsWith(github.ref_name, 'submissions/') }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ORG_ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          .github/scripts/run-submission-static-review.sh

      - name: Enforce modifiable surface
        if: ${{ startsWith(github.ref_name, 'submissions/') }}
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")" \
            .github/scripts/enforce-modifiable-surface.sh

      - name: Probe runtime worker sandbox
        run: .github/scripts/probe-runtime-worker-sandbox.sh

      - name: Restore SwiftPM cache
        id: restore_swiftpm_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Swift harness and reference checkpoint
        env:
          MLXFAST_REFERENCE_BASE_URL: ${{ secrets.MLXFAST_REFERENCE_BASE_URL || 'https://ds4.darkbloom.ai/deepseek-v4-flash-4bit' }}
          MLXFAST_REFERENCE_AUTH_HEADER: ${{ secrets.MLXFAST_REFERENCE_AUTH_HEADER }}
          MLXFAST_REFERENCE_DOWNLOAD_JOBS: ${{ inputs.reference_download_jobs }}
          MLXFAST_REFERENCE_MIN_FREE_GIB: ${{ inputs.reference_min_free_gib }}
          MLXFAST_REFERENCE_POST_DOWNLOAD_FULL_VERIFY: "0"
        run: ./setup.sh

      - name: Save SwiftPM cache
        if: ${{ steps.restore_swiftpm_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: ${{ steps.restore_swiftpm_cache.outputs.cache-primary-key }}

      - name: Transform reference checkpoint
        run: |
          set -euo pipefail
          mkdir -p weights
          MLXFAST_OFFLINE_WRITABLE_PATHS="${PWD}/weights" \
            .github/scripts/run-offline.sh .build/release/mlxfast-swift transform \
            --reference "${MLXFAST_REFERENCE_DIR}" \
            --output weights

      - name: Hash transformed weights
        run: .github/scripts/hash-weights-directory.sh weights weights.sha256

      - name: Download and verify hidden correctness golden
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_ENDPOINT: ${{ secrets.R2_BUCKET_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${MLXFAST_CORRECTNESS_GOLDEN_PATH}")"
          .github/scripts/download-r2-object.sh \
            "${MLXFAST_CORRECTNESS_GOLDEN_R2_PATH}" \
            "${MLXFAST_CORRECTNESS_GOLDEN_PATH}"
          .github/scripts/verify-correctness-golden.sh

      - name: Check correctness slice
        id: correctness
        env:
          # Routed through env: rather than interpolated directly into the run:
          # body -- see the matching comment in parallel-correctness-probe-
          # slice.yml for why ${{ inputs.* }} must never be inlined directly.
          STEP_RANGE: ${{ inputs.step_range }}
        run: |
          set -euo pipefail
          status=0
          started="${SECONDS}"
          # --step-range-output passes through the CLI's requirePrivateOutputPath,
          # which (now that this job sets MLXFAST_PRIVATE_DIR for the worker
          # subtree-deny) requires the target to live UNDER the private dir. The
          # sidecar itself is non-private assigned-range metadata that combine
          # needs as a public artifact, so write it into the private dir here and
          # copy it out to the workspace below -- the private dir denies the
          # sandboxed WORKER, not these unsandboxed parent steps.
          step_range_private="${MLXFAST_PRIVATE_DIR}/step-range.json"
          if [[ "${MLXFAST_IS_SUBMISSION_BRANCH}" == "1" ]]; then
            echo "benchmark-correctness-slice: running submitted correctness slice with private process logs suppressed"
            .build/release/mlxfast-swift correctness \
              --weights weights \
              --golden "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
              --base-case-only \
              --step-range "${STEP_RANGE}" \
              --step-range-output "${step_range_private}" \
              > correctness-report.json \
              2> "${RUNNER_TEMP}/mlxfast-correctness-slice-private.log" || status=$?
            if [[ "${status}" -ne 0 ]]; then
              echo "benchmark-correctness-slice: submitted correctness slice failed after $((SECONDS - started))s"
            fi
          else
            .build/release/mlxfast-swift correctness \
              --weights weights \
              --golden "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
              --base-case-only \
              --step-range "${STEP_RANGE}" \
              --step-range-output "${step_range_private}" \
              > correctness-report.json || status=$?
          fi
          # Copy the assigned-range sidecar out for the combine artifact. It is
          # written before the model runs, so it exists on any failure past
          # argument validation; a pre-write throw fails the step anyway.
          if [[ -s "${step_range_private}" ]]; then
            cp "${step_range_private}" step-range.json
          fi
          # The serial run's published correctness_seconds covered base case +
          # gates together; the gates machine now only reports its own gates
          # time, so without this sidecar the three slices' base-case duration
          # would appear in no published artifact at all (CorrectnessReport has
          # no seconds field) and a base-case slowdown would be invisible.
          # combine-parallel-correctness.sh sums these back into
          # metrics.correctness_seconds. Wall-clock seconds only -- carries no
          # token or prompt content.
          printf '{"slice_seconds":%d}\n' "$((SECONDS - started))" > slice-timing.json
          exit "${status}"

      # Mirrors benchmark.yml's "Validate correctness artifacts" gate: on a real
      # hidden-step mismatch, CorrectnessReport carries the actual golden token,
      # the model's predicted token, and the failing case name. deny-private-
      # artifacts.sh only checks filenames/symlinks/size, not JSON content, so
      # without this the raw report would otherwise reach the unconditional
      # upload below. For submission branches (untrusted submitted code), a
      # failed validation blocks the report from ever being staged/uploaded --
      # the failure still reaches combine's overall pass/fail via this job's own
      # exit code, just without the sensitive field values leaving the runner.
      - name: Validate correctness slice artifacts
        id: validate_correctness_slice
        if: always()
        env:
          STEP_RANGE: ${{ inputs.step_range }}
        run: |
          set -euo pipefail
          test -s correctness-report.json
          range_start="${STEP_RANGE%-*}"
          range_end="${STEP_RANGE#*-}"
          expected_checked_steps=$((range_end - range_start))
          jq -e \
            --arg golden_hash "${MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256}" \
            --argjson checked_steps "${expected_checked_steps}" \
            '
            def same_keys($expected):
              (keys_unsorted | sort) == ($expected | sort);

            same_keys([
              "actual_token",
              "case_count",
              "checked_steps",
              "error",
              "expected_token",
              "expert_bytes_read",
              "expert_cache_evictions",
              "expert_cache_hits",
              "expert_cache_misses",
              "expert_hit_rate",
              "expert_peak_cached_tensors",
              "expert_read_seconds",
              "first_failing_case",
              "first_failing_step",
              "golden_hash",
              "passed"
            ])
            and .passed == true
            and .checked_steps == $checked_steps
            and .golden_hash == $golden_hash
            and .error == ""
            and .first_failing_case == null
            and .first_failing_step == null
            and .expected_token == null
            and .actual_token == null
            ' \
            correctness-report.json >/dev/null

      - name: Check correctness slice artifact paths
        if: ${{ always() && ((!(startsWith(github.ref_name, 'submissions/'))) || steps.validate_correctness_slice.outcome == 'success') }}
        run: |
          set -euo pipefail
          .github/scripts/deny-private-artifacts.sh \
            correctness-report.json \
            step-range.json \
            slice-timing.json \
            weights.sha256

      - name: Upload slice artifact
        if: ${{ always() && ((!(startsWith(github.ref_name, 'submissions/'))) || steps.validate_correctness_slice.outcome == 'success') }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: benchmark-parallel-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.slice_name }}
          path: |
            correctness-report.json
            step-range.json
            slice-timing.json
            weights.sha256
          if-no-files-found: error
          retention-days: 90
