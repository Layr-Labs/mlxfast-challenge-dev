name: preserve-correctness-golden

on:
  workflow_dispatch:

concurrency:
  group: preserve-correctness-golden-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preserve:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 15
    env:
      MLXFAST_CORRECTNESS_GOLDEN_CACHE_VERSION: v2
      MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH: .mlxfast-cache/correctness-golden/correctness_golden.json
      MLXFAST_PRIVATE_PROMPTS_CACHE_VERSION: ${{ vars.MLXFAST_PRIVATE_PROMPTS_CACHE_VERSION || 'r2-v1' }}
      MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256: c5d520ec87cc4a105ff13a39ade581801049a90944d42f456d15a33ef080eb1e
      MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES: "20425"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Restore cached correctness golden
        id: restore-correctness-golden
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .mlxfast-cache/correctness-golden
          key: correctness-golden-${{ runner.os }}-${{ runner.arch }}-blacksmith-macos-26-${{ env.MLXFAST_CORRECTNESS_GOLDEN_CACHE_VERSION }}-${{ env.MLXFAST_PRIVATE_PROMPTS_CACHE_VERSION }}-${{ hashFiles('Package.resolved', 'Sources/MLXFastCore/Constants.swift', 'Sources/MLXFastCore/Golden.swift', 'Sources/MLXFastDeepSeekHarness/**') }}

      - name: Materialize correctness golden
        run: |
          set -euo pipefail
          if [[ ! -s "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" ]]; then
            echo "preserve-correctness-golden: cached correctness golden missing at ${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" >&2
            echo "preserve-correctness-golden: cache-hit=${{ steps.restore-correctness-golden.outputs.cache-hit }}" >&2
            exit 1
          fi
          cp "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" correctness_golden.json
          actual_hash="$(shasum -a 256 correctness_golden.json | awk '{print $1}')"
          actual_bytes="$(wc -c < correctness_golden.json | tr -d ' ')"
          export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256="${actual_hash}"
          export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES="${actual_bytes}"
          echo "preserve-correctness-golden: materialized ${actual_hash} bytes=${actual_bytes}"
          .github/scripts/verify-correctness-golden.sh

      - name: Upload correctness golden metadata
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: correctness-golden-metadata-${{ github.run_id }}
          path: |
            correctness_golden.json
            correctness_golden.json.sha256
            correctness_golden.json.bytes
          if-no-files-found: error
