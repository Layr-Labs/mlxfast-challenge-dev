name: parallel-correctness-probe

# Manual experiment for splitting the base teacher-forced correctness case across
# multiple Blacksmith machines. This workflow is not part of CI or scoring; it
# exists to validate --base-case-only / --step-range / --step-range-output /
# combine-parallel-correctness.sh end to end on real infrastructure, not just the
# local bash/xctest simulation. Each of the three slice jobs independently
# downloads and transforms the full ~141 GiB reference checkpoint (no shared
# cache between them yet -- see the parallelization plan's honest wall-clock
# section on why that's a throughput lever, not a per-run latency one), so this
# is expensive and deliberately dispatch-only.
#
# Scope: this validates the correctness-split mechanism (the part that's
# actually built and tested) plus a real, independent 4th machine (machine1-
# check below). It deliberately does NOT attempt real GPQA/TTFT/timing checks:
# those require the hidden golden fixture and R2 credentials, which must never
# be reachable from a manual, unprotected, dispatch-only workflow like this one
# (its logs and artifacts are visible to anyone who can trigger it). That real
# checking already happens, under secrets and environment protection, on every
# ranked run of the official benchmark.yml -- this probe only needed to prove
# out the NEW split mechanism, not duplicate what benchmark.yml already covers.
# Uses the checked-in public correctness fixture only; no private secrets, no
# hidden golden, no environment protection needed.
on:
  workflow_dispatch:
    inputs:
      range_1:
        description: "Base-case step range for slice 1, as START-END (half-open)."
        required: false
        default: "0-21"
        type: string
      range_2:
        description: "Base-case step range for slice 2, as START-END (half-open)."
        required: false
        default: "21-42"
        type: string
      range_3:
        description: "Base-case step range for slice 3, as START-END (half-open)."
        required: false
        default: "42-64"
        type: string
      reference_download_jobs:
        description: "Parallel shard downloads for setup.sh, per machine."
        required: false
        default: "12"
        type: string
      reference_min_free_gib:
        description: "Minimum free GiB required before reference checkpoint download."
        required: false
        default: "170"
        type: string

concurrency:
  group: parallel-correctness-probe-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH: correctness_prompts/public_longcopy_gate_english_512_256.json
  MLXFAST_EXPECTED_CORRECTNESS_STEPS: "64"
  MLXFAST_REFERENCE_MANIFEST_PATH: fixtures/reference_deepseek_v4_flash_4bit.sha256
  MLXFAST_REFERENCE_DIR: .cache/huggingface/hub/models--mlx-community--DeepSeek-V4-Flash-4bit/snapshots/main

jobs:
  correctness-slice-1:
    name: "slice 1 (${{ inputs.range_1 }})"
    uses: ./.github/workflows/parallel-correctness-probe-slice.yml
    with:
      slice_name: machine2
      step_range: ${{ inputs.range_1 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  correctness-slice-2:
    name: "slice 2 (${{ inputs.range_2 }})"
    uses: ./.github/workflows/parallel-correctness-probe-slice.yml
    with:
      slice_name: machine3
      step_range: ${{ inputs.range_2 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  correctness-slice-3:
    name: "slice 3 (${{ inputs.range_3 }})"
    uses: ./.github/workflows/parallel-correctness-probe-slice.yml
    with:
      slice_name: machine4
      step_range: ${{ inputs.range_3 }}
      reference_download_jobs: ${{ inputs.reference_download_jobs }}
      reference_min_free_gib: ${{ inputs.reference_min_free_gib }}

  machine1-check:
    name: "machine1 (real transform + smoke check, stand-in score)"
    # A real 4th machine, not a fabrication: independently downloads and
    # transforms the reference checkpoint (so the combiner's weights-hash
    # tripwire genuinely cross-checks all 4 machines instead of 3 real ones plus
    # a copy of machine2's hash) and runs a real --local-iterate smoke check of
    # the public fixture (so a broken transform/worker/decode path on this
    # specific machine fails the job instead of going unnoticed).
    #
    # Its score.json payload is still a documented stand-in for the fields that
    # would come from real GPQA/TTFT/timing on the official benchmark.yml: the
    # public fixture has no GPQA cases and no benchmark oracle (by design -- see
    # the workflow header), so there is no safe, secret-free way to compute real
    # values for those fields here. checked_steps stays 0 deliberately: this
    # machine's role is to skip the base case (MLXFAST_BENCHMARK_CORRECTNESS_
    # STEPS=0 in the real topology) and let machine2-4 cover it in slices, so
    # combine-parallel-correctness.sh's `own checked_steps + base-case total`
    # arithmetic must not be polluted by the unrelated --local-iterate smoke
    # check's own step count.
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 360
    env:
      MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH: correctness_prompts/public_longcopy_gate_english_512_256.json
      MLXFAST_REFERENCE_MANIFEST_PATH: fixtures/reference_deepseek_v4_flash_4bit.sha256
      MLXFAST_REFERENCE_DIR: .cache/huggingface/hub/models--mlx-community--DeepSeek-V4-Flash-4bit/snapshots/main
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore SwiftPM cache
        id: restore_swiftpm_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Swift harness and reference checkpoint
        env:
          # This file references no repo secrets by design -- see the workflow
          # header comment. setup.sh falls back to its own public
          # DEFAULT_REFERENCE_BASE_URL and an empty auth header when these are
          # unset, which is exactly what this job needs.
          MLXFAST_REFERENCE_DOWNLOAD_JOBS: ${{ inputs.reference_download_jobs }}
          MLXFAST_REFERENCE_MIN_FREE_GIB: ${{ inputs.reference_min_free_gib }}
          MLXFAST_REFERENCE_POST_DOWNLOAD_FULL_VERIFY: "0"
        run: ./setup.sh

      - name: Save SwiftPM cache
        if: ${{ steps.restore_swiftpm_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: ${{ steps.restore_swiftpm_cache.outputs.cache-primary-key }}

      - name: Transform reference checkpoint
        run: |
          set -euo pipefail
          mkdir -p weights
          MLXFAST_OFFLINE_WRITABLE_PATHS="${PWD}/weights" \
            .github/scripts/run-offline.sh .build/release/mlxfast-swift transform \
            --reference "${MLXFAST_REFERENCE_DIR}" \
            --output weights

      - name: Hash transformed weights
        run: .github/scripts/hash-weights-directory.sh weights weights.sha256

      - name: Run real smoke check (public fixture only)
        env:
          # Deliberately ./benchmark.sh, not the raw binary: the raw binary's
          # `benchmark` subcommand always exits 0 and just writes a failing
          # payload (`"passed": false`) to score-path -- it's benchmark.sh's own
          # `grep -Eq '"passed"...false'` check (line ~350) that turns that into
          # a nonzero exit. Calling the raw binary directly here would silently
          # report success even if this machine's transform/worker/decode path
          # were actually broken. benchmark.sh also rejects --weights/--golden/
          # --score-path as direct arguments (it wants the env vars below), and
          # gets the established sandbox/network-isolation handling for free.
          MLXFAST_SKIP_TRANSFORM: "1"
          MLXFAST_WEIGHTS_PATH: weights
          MLXFAST_CORRECTNESS_GOLDEN_PATH: ${{ env.MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH }}
          MLXFAST_SCORE_PATH: score.local-iterate.json
        run: |
          set -euo pipefail
          ./benchmark.sh --local-iterate
          cat score.local-iterate.json

      - name: Write stand-in score.json for the combiner
        # No `if: always()` here deliberately: if the smoke check step above
        # failed, `set -euo pipefail` already stopped the job before reaching
        # this step, so score.json never gets written or uploaded, and the
        # combiner's `require_file "${MACHINE1_DIR}/score.json"` correctly
        # fails closed instead of combining a stand-in with a broken machine.
        run: |
          set -euo pipefail
          cat > score.json <<'EOF'
          {
            "score": null,
            "passed": true,
            "metrics": {
              "passed_correctness": true,
              "checked_steps": 0,
              "case_count": 1,
              "first_failing_case": null,
              "first_failing_step": null
            }
          }
          EOF

      - name: Upload machine1 artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: parallel-correctness-probe-${{ github.run_id }}-machine1
          path: |
            score.json
            score.local-iterate.json
            weights.sha256
          if-no-files-found: error
          retention-days: 7

  full-reference-check:
    name: "full reference check (no split)"
    # Independently checks the WHOLE base case on one machine, unsplit -- not
    # part of the split mechanism at all, and not consumed by
    # combine-parallel-correctness.sh. Exists purely so the combine job can
    # assert the split-derived verdict agrees with a genuine, independently-run
    # full check of the exact same case: if a real bug ever caused the split
    # ranges to miss part of the window (the class of bug covered by review
    # finding 2), a real full run over the same case would still check it and
    # the two verdicts would disagree.
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 360
    env:
      MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH: correctness_prompts/public_longcopy_gate_english_512_256.json
      MLXFAST_REFERENCE_MANIFEST_PATH: fixtures/reference_deepseek_v4_flash_4bit.sha256
      MLXFAST_REFERENCE_DIR: .cache/huggingface/hub/models--mlx-community--DeepSeek-V4-Flash-4bit/snapshots/main
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore SwiftPM cache
        id: restore_swiftpm_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Swift harness and reference checkpoint
        env:
          # This file references no repo secrets by design (see the workflow
          # header comment; R2/auth-header usage lives only in the reusable
          # parallel-correctness-probe-slice.yml) -- setup.sh already falls back
          # to its own public DEFAULT_REFERENCE_BASE_URL and an empty auth header
          # when these are unset, which is exactly what this job needs.
          MLXFAST_REFERENCE_DOWNLOAD_JOBS: ${{ inputs.reference_download_jobs }}
          MLXFAST_REFERENCE_MIN_FREE_GIB: ${{ inputs.reference_min_free_gib }}
          MLXFAST_REFERENCE_POST_DOWNLOAD_FULL_VERIFY: "0"
        run: ./setup.sh

      - name: Save SwiftPM cache
        if: ${{ steps.restore_swiftpm_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: ${{ steps.restore_swiftpm_cache.outputs.cache-primary-key }}

      - name: Transform reference checkpoint
        run: |
          set -euo pipefail
          mkdir -p weights
          MLXFAST_OFFLINE_WRITABLE_PATHS="${PWD}/weights" \
            .github/scripts/run-offline.sh .build/release/mlxfast-swift transform \
            --reference "${MLXFAST_REFERENCE_DIR}" \
            --output weights

      - name: Hash transformed weights
        run: .github/scripts/hash-weights-directory.sh weights weights.sha256

      - name: Run full (unsplit) correctness check
        run: |
          set -euo pipefail
          status=0
          # Deliberately the plain `correctness` subcommand with no --step-range:
          # that always covers the full [0, correctnessSteps) window (64 steps) in
          # one pass, same as every other machine in this probe. --base-case-only
          # skips anchors/free-run/behavior/GPQA so this is directly comparable to
          # the slices' own checked_steps -- unlike `benchmark --local-iterate`,
          # which only ever checks a fixed 16 decode steps regardless of --golden
          # and would silently under-check (and falsely "disagree" with) here.
          .build/release/mlxfast-swift correctness \
            --weights weights \
            --golden "${MLXFAST_PUBLIC_CORRECTNESS_GOLDEN_PATH}" \
            --base-case-only \
            > correctness-report.json || status=$?
          cat correctness-report.json
          exit "${status}"

      - name: Upload full-reference artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: parallel-correctness-probe-${{ github.run_id }}-full-reference
          path: |
            correctness-report.json
            weights.sha256
          if-no-files-found: error
          retention-days: 7

  combine:
    name: combine
    needs:
      [
        correctness-slice-1,
        correctness-slice-2,
        correctness-slice-3,
        full-reference-check,
        machine1-check,
      ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download slice artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: parallel-correctness-probe-${{ github.run_id }}-*
          path: slices
          merge-multiple: false

      - name: Assemble machine directories
        run: |
          set -euo pipefail
          mkdir -p machine1 machine2 machine3 machine4
          # machine1's score.json is still a documented stand-in for GPQA/TTFT/
          # timing (see machine1-check's job comment for why), but its
          # weights.sha256 is now real and independently computed on its own
          # machine -- the combiner's determinism tripwire genuinely cross-checks
          # all 4 machines instead of 3 real ones plus a borrowed hash.
          cp "slices/parallel-correctness-probe-${{ github.run_id }}-machine1/score.json" machine1/
          cp "slices/parallel-correctness-probe-${{ github.run_id }}-machine1/weights.sha256" machine1/
          cp "slices/parallel-correctness-probe-${{ github.run_id }}-machine2/"* machine2/
          cp "slices/parallel-correctness-probe-${{ github.run_id }}-machine3/"* machine3/
          cp "slices/parallel-correctness-probe-${{ github.run_id }}-machine4/"* machine4/

      - name: Combine
        env:
          # MLXFAST_EXPECTED_CORRECTNESS_STEPS is inherited from the workflow-level
          # env: block above.
          MLXFAST_CORRECTNESS_MACHINE_DIRS: "machine2 machine3 machine4"
          MLXFAST_COMBINED_SCORE_PATH: score.combined.json
        run: .github/scripts/combine-parallel-correctness.sh

      # The strongest check in this whole probe: full-reference-check
      # independently verifies the WHOLE base case, unsplit, on its own machine.
      # If it disagrees with the split-derived verdict for the exact same case,
      # that's a real bug in the split mechanism (this is precisely the class of
      # bug review finding 2 was about, now checked against real infrastructure
      # instead of a hand-built local repro) -- not a range misconfiguration,
      # which combine-parallel-correctness.sh already catches on its own.
      - name: Cross-check split result against full reference
        if: always()
        run: |
          set -euo pipefail
          full_ref_dir="slices/parallel-correctness-probe-${{ github.run_id }}-full-reference"
          if [[ ! -s "${full_ref_dir}/correctness-report.json" ]]; then
            echo "::warning::full-reference-check produced no correctness-report.json; skipping cross-check"
            exit 0
          fi

          full_ref_hash="$(cat "${full_ref_dir}/weights.sha256")"
          # Only compared against machine2 directly, not machine3/4/machine1 --
          # that's intentional, not a shortcut: the Combine step above already
          # ran combine-parallel-correctness.sh's own tripwire, which requires
          # all of machine1-4 to agree with each other before getting this far.
          # So comparing against any one of them transitively covers all four.
          split_hash="$(cat machine2/weights.sha256)"
          if [[ "${full_ref_hash}" != "${split_hash}" ]]; then
            echo "::error::full-reference-check weights hash (${full_ref_hash}) does not match the split machines' (${split_hash})" >&2
            exit 1
          fi

          full_ref_passed="$(jq -r '.passed' "${full_ref_dir}/correctness-report.json")"
          full_ref_checked_steps="$(jq -r '.checked_steps' "${full_ref_dir}/correctness-report.json")"
          echo "full-reference passed=${full_ref_passed} checked_steps=${full_ref_checked_steps}"

          if [[ "${full_ref_passed}" == "true" && "${full_ref_checked_steps}" != "${MLXFAST_EXPECTED_CORRECTNESS_STEPS}" ]]; then
            echo "::error::full-reference-check passed but only checked ${full_ref_checked_steps} of the expected ${MLXFAST_EXPECTED_CORRECTNESS_STEPS} steps" >&2
            exit 1
          fi

          if [[ ! -s score.combined.json ]]; then
            echo "::notice::no combined result to cross-check (combine step already failed separately)"
            exit 0
          fi
          split_passed="$(jq -r '.metrics.passed_correctness' score.combined.json)"
          echo "split-derived passed_correctness=${split_passed}"

          if [[ "${full_ref_passed}" != "${split_passed}" ]]; then
            echo "::error::split-derived correctness verdict (${split_passed}) disagrees with an independent full-reference check (${full_ref_passed}) of the exact same base case" >&2
            exit 1
          fi
          echo "cross-check: split-derived verdict agrees with the independent full-reference check"

      - name: Probe summary
        if: always()
        env:
          # Routed through env: rather than interpolated directly into the run:
          # body, matching the established convention in benchmark.yml -- see the
          # comment on parallel-correctness-probe-slice.yml's "Check correctness
          # slice" step for why ${{ inputs.* }} must never be inlined into a
          # run: script directly. (${{ github.run_id }} below is left as direct
          # interpolation: it's GitHub-assigned and always a plain integer, never
          # attacker-influenced text.)
          RANGE_1: ${{ inputs.range_1 }}
          RANGE_2: ${{ inputs.range_2 }}
          RANGE_3: ${{ inputs.range_3 }}
        run: |
          {
            echo "## Parallel Correctness Probe"
            echo ""
            echo "- ranges: \`${RANGE_1}\`, \`${RANGE_2}\`, \`${RANGE_3}\`"
            if [[ -s score.combined.json ]]; then
              echo "- combined passed: \`$(jq -r '.passed' score.combined.json)\`"
              echo "- combined checked_steps: \`$(jq -r '.metrics.checked_steps' score.combined.json)\`"
              echo "- first_failing_case: \`$(jq -r '.metrics.first_failing_case // "none"' score.combined.json)\`"
            else
              echo "- combiner did not produce ${MLXFAST_COMBINED_SCORE_PATH:-score.combined.json}"
            fi
            full_ref_dir="slices/parallel-correctness-probe-${{ github.run_id }}-full-reference"
            if [[ -s "${full_ref_dir}/correctness-report.json" ]]; then
              echo "- full-reference passed: \`$(jq -r '.passed' "${full_ref_dir}/correctness-report.json")\`"
              echo "- full-reference checked_steps: \`$(jq -r '.checked_steps' "${full_ref_dir}/correctness-report.json")\`"
            fi
            machine1_dir="slices/parallel-correctness-probe-${{ github.run_id }}-machine1"
            if [[ -s "${machine1_dir}/score.local-iterate.json" ]]; then
              echo "- machine1 real smoke check passed: \`$(jq -r '.passed' "${machine1_dir}/score.local-iterate.json")\` (public fixture only; not a GPQA/TTFT check -- see machine1-check's job comment)"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload combined result
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: parallel-correctness-probe-${{ github.run_id }}-combined
          path: score.combined.json
          if-no-files-found: warn
          retention-days: 7
