name: benchmark-timing-or-gates

# OPERATOR DEBUG variant (branch-local, never merged to main): identical to
# main's version through the Benchmark step, except the submitted-process log
# suppression applies on EVERY ref (this debug branch is not submissions/* but
# re-runs submitted code). Everything after the Benchmark step -- semantic
# GPQA, artifact validation, and the intermediate artifact upload -- is
# replaced by a single "Redacted failure report" step: this branch exists to
# surface WHY a submission's timing run failed without uploading or printing
# anything derived from hidden fixtures.
#
# Not meant to be dispatched on its own -- workflow_call only.
on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      reference_download_jobs:
        required: true
        type: string
      reference_min_free_gib:
        required: true
        type: string
      verify_transform:
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  run:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 720
    environment: benchmark-private-prompts
    env:
      MLXFAST_PRIVATE_DIR: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.mode }}
      MLXFAST_CORRECTNESS_GOLDEN_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.mode }}/correctness_golden.json
      MLXFAST_GPQA_REFERENCE_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.mode }}/gpqa_reference_cases.json
      MLXFAST_SEMANTIC_GPQA_OUTPUT_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.mode }}/semantic_gpqa_answers.json
      MLXFAST_SEMANTIC_GPQA_RESULTS_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.mode }}/semantic_gpqa_results.json
      MLXFAST_SUBMISSION_STATIC_REVIEW_RESULTS_PATH: /tmp/mlxfast-private-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.mode }}/submission_static_review.json
      MLXFAST_OFFICIAL_BENCHMARK_RUN: "1"
      MLXFAST_IS_SUBMISSION_BRANCH: ${{ (startsWith(github.ref_name, 'submissions/')) && '1' || '0' }}
      MLXFAST_PRIVATE_PROMPTS_R2_PRESENT: ${{ (secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_BUCKET_ENDPOINT != '' && secrets.R2_SECRET_ACCESS_KEY != '') && '1' || '0' }}
      MLXFAST_ANTHROPIC_PRESENT: ${{ secrets.ORG_ANTHROPIC_API_KEY != '' && '1' || '0' }}
      MLXFAST_CORRECTNESS_GOLDEN_R2_PATH: correctness_prompts/golden_prompt_benchmark_transcription_gate_english_512_256.json
      MLXFAST_GPQA_R2_PATH: correctness_prompts/gpqa_reference_cases.json
      MLXFAST_GPQA_CASE_COUNT: "5"
      MLXFAST_GPQA_MAX_NEW_TOKENS: "10"
      MLXFAST_SEMANTIC_GPQA_CASE_COUNT: "5"
      MLXFAST_SEMANTIC_GPQA_MAX_NEW_TOKENS: "10"
      MLXFAST_SEMANTIC_GPQA_MIN_PASS: "3"
      MLXFAST_SEMANTIC_GPQA_REQUIRED: "1"
      MLXFAST_SEMANTIC_GPQA_MODEL: claude-sonnet-4-5-20250929
      MLXFAST_REFERENCE_MANIFEST_PATH: fixtures/reference_deepseek_v4_flash_4bit.sha256
      MLXFAST_REFERENCE_DIR: .cache/huggingface/hub/models--mlx-community--DeepSeek-V4-Flash-4bit/snapshots/main
      MLXFAST_EXPECTED_CORRECTNESS_STEPS: "64"
      MLXFAST_TRUSTED_BENCHMARK_REF: ${{ github.ref }}
      MLXFAST_VERIFY_TRANSFORM: ${{ inputs.verify_transform && '1' || '0' }}
      # Both machines skip the base case entirely -- correctness-slice-1/2/3
      # cover it. mode selects which of the two remaining halves this machine
      # runs; see the harness-level comment on BenchmarkOptions for why running
      # neither (or, structurally impossible here, both) is invalid.
      MLXFAST_BENCHMARK_CORRECTNESS_STEPS: "0"
      MLXFAST_BENCHMARK_CHECK_GATES: ${{ inputs.mode == 'gates' && '1' || '0' }}
      MLXFAST_BENCHMARK_SKIP_TIMED: ${{ inputs.mode == 'gates' && '1' || '0' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce trusted workflow context
        run: .github/scripts/enforce-trusted-benchmark-workflow.sh

      - name: Probe runtime worker sandbox
        run: .github/scripts/probe-runtime-worker-sandbox.sh

      - name: Check correctness golden source
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${MLXFAST_CORRECTNESS_GOLDEN_PATH}")"
          if [[ "${MLXFAST_PRIVATE_PROMPTS_R2_PRESENT}" != "1" ]]; then
            echo "benchmark-timing-or-gates: hidden GPQA behavior gate requires private R2 secrets" >&2
            exit 1
          fi
          if [[ "${MLXFAST_ANTHROPIC_PRESENT}" != "1" ]]; then
            echo "benchmark-timing-or-gates: semantic GPQA gate requires ORG_ANTHROPIC_API_KEY" >&2
            exit 1
          fi

      - name: Restore SwiftPM cache
        id: restore_swiftpm_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Swift harness and reference checkpoint
        env:
          MLXFAST_REFERENCE_BASE_URL: ${{ secrets.MLXFAST_REFERENCE_BASE_URL || 'https://ds4.darkbloom.ai/deepseek-v4-flash-4bit' }}
          MLXFAST_REFERENCE_AUTH_HEADER: ${{ secrets.MLXFAST_REFERENCE_AUTH_HEADER }}
          MLXFAST_REFERENCE_DOWNLOAD_JOBS: ${{ inputs.reference_download_jobs }}
          MLXFAST_REFERENCE_MIN_FREE_GIB: ${{ inputs.reference_min_free_gib }}
          MLXFAST_REFERENCE_POST_DOWNLOAD_FULL_VERIFY: "0"
        run: ./setup.sh

      - name: Save SwiftPM cache
        if: ${{ steps.restore_swiftpm_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: ${{ steps.restore_swiftpm_cache.outputs.cache-primary-key }}

      - name: Transform reference checkpoint
        run: |
          set -euo pipefail
          mkdir -p weights
          MLXFAST_OFFLINE_WRITABLE_PATHS="${PWD}/weights" \
            .github/scripts/run-offline.sh .build/release/mlxfast-swift transform \
            --reference "${MLXFAST_REFERENCE_DIR}" \
            --output weights

      - name: Prepare correctness golden
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_ENDPOINT: ${{ secrets.R2_BUCKET_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          .github/scripts/download-r2-object.sh \
            "${MLXFAST_CORRECTNESS_GOLDEN_R2_PATH}" \
            "${MLXFAST_CORRECTNESS_GOLDEN_PATH}"
          .github/scripts/download-r2-object.sh \
            "${MLXFAST_GPQA_R2_PATH}" \
            "${MLXFAST_GPQA_REFERENCE_PATH}"
          .build/release/mlxfast-swift attach-gpqa-gates \
            --golden "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
            --gpqa "${MLXFAST_GPQA_REFERENCE_PATH}" \
            --tokenizer weights \
            --output "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" \
            --case-count "${MLXFAST_GPQA_CASE_COUNT}" \
            --max-new-tokens "${MLXFAST_GPQA_MAX_NEW_TOKENS}"
          actual_hash="$(shasum -a 256 "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" | awk '{print $1}')"
          actual_bytes="$(wc -c < "${MLXFAST_CORRECTNESS_GOLDEN_PATH}" | tr -d ' ')"
          export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256="${actual_hash}"
          export MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES="${actual_bytes}"
          {
            echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_SHA256=${actual_hash}"
            echo "MLXFAST_EXPECTED_CORRECTNESS_GOLDEN_BYTES=${actual_bytes}"
          } >> "${GITHUB_ENV}"
          echo "benchmark-timing-or-gates: using private GPQA-augmented correctness golden ${actual_hash} bytes=${actual_bytes}"
          .github/scripts/verify-correctness-golden.sh

      - name: Benchmark
        env:
          MLXFAST_NOTE: "ci ${{ github.event_name }} ${{ github.sha }} mode=${{ inputs.mode }} operator-debug"
          MLXFAST_SKIP_TRANSFORM: "1"
        run: |
          set -euo pipefail
          # Operator debug: this ref is not submissions/* but re-runs submitted
          # code, so ALWAYS suppress the raw submitted-process output.
          echo "benchmark-timing-or-gates: running submitted benchmark (${{ inputs.mode }}) with private process logs suppressed"
          started="${SECONDS}"
          ./benchmark.sh > "${RUNNER_TEMP}/mlxfast-benchmark-private.log" 2>&1 &
          pid="$!"
          while kill -0 "${pid}" 2>/dev/null; do
            sleep 60
            if kill -0 "${pid}" 2>/dev/null; then
              echo "benchmark-timing-or-gates: submitted benchmark still running elapsed=$((SECONDS - started))s"
            fi
          done
          wait "${pid}"

      # Replaces main's validate/deny/upload chain on this operator-debug
      # branch: print a REDACTED failure summary and upload nothing at all.
      # Redaction rules:
      #  - expected_token/actual_token metrics are never printed;
      #  - first_failing_case can carry hidden-fixture case identifiers on
      #    correctness failures, so it is printed only when null or the
      #    known-safe timed-phase literal "benchmark";
      #  - the free-text error and the log tail have every run of 3+ digits
      #    masked, so hidden-oracle token ids cannot appear;
      #  - only the trusted harness writes to the private log (worker stdout is
      #    the protocol pipe; worker stderr only surfaces inside error strings,
      #    which are masked; the editable surface contains no print statements),
      #    so the masked tail is safe to echo.
      - name: Redacted failure report
        if: always()
        run: |
          set -euo pipefail
          echo "== score.json summary (token-id fields omitted, error digit-masked) =="
          if [[ -s score.json ]]; then
            jq -r '
              [
                "passed=\(.passed)",
                "score=\(.score)",
                "partial_result=\(.metrics.partial_result)",
                "passed_correctness=\(.metrics.passed_correctness)",
                "first_failing_case=\(
                  if .metrics.first_failing_case == null or .metrics.first_failing_case == "benchmark"
                  then .metrics.first_failing_case
                  else "[redacted-case-id]"
                  end)",
                "first_failing_step=\(.metrics.first_failing_step)",
                "first_failing_layer=\(.metrics.first_failing_layer)",
                "prefill_seconds_per_token=\(.metrics.prefill_seconds_per_token)",
                "decode_seconds_per_token=\(.metrics.decode_seconds_per_token)",
                "prefill_speedup=\(.metrics.prefill_speedup)",
                "decode_speedup=\(.metrics.decode_speedup)",
                "timed_benchmark_seconds=\(.metrics.timed_benchmark_seconds)",
                "benchmark_wall_seconds=\(.metrics.benchmark_wall_seconds)",
                "correctness_seconds=\(.metrics.correctness_seconds)",
                "preflight_seconds=\(.metrics.preflight_seconds)",
                "peak_ram_gb=\(.metrics.peak_ram_gb)",
                "process_resident_memory_gb=\(.metrics.process_resident_memory_gb)",
                "bandwidth_source=\(.metrics.bandwidth_source)",
                "expert_bytes_read=\(.metrics.expert_bytes_read)",
                "expert_cache_hits=\(.metrics.expert_cache_hits)",
                "expert_cache_misses=\(.metrics.expert_cache_misses)"
              ] | .[]
            ' score.json
            printf 'error='
            jq -r '.metrics.error // ""' score.json | sed -E 's/[0-9]{3,}/<num>/g' | head -c 2000
            echo
          else
            echo "score.json missing or empty"
          fi
          echo "== private log tail (digit-masked) =="
          log="${RUNNER_TEMP}/mlxfast-benchmark-private.log"
          if [[ -s "${log}" ]]; then
            tail -n 150 "${log}" | sed -E 's/[0-9]{3,}/<num>/g' | cut -c 1-400
          else
            echo "private log missing or empty"
          fi
