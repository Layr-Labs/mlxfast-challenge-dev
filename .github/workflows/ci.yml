name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 45
    env:
      CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/.build/clang-module-cache
      MLXFAST_RUN_MLX_RUNTIME_TESTS: "0"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Restore SwiftPM cache
        id: restore_swiftpm_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Enforce contestant modifiable surface
        if: startsWith(github.head_ref, 'submissions/') || startsWith(github.ref_name, 'submissions/')
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            export BASE_SHA="${PR_BASE_SHA}"
            export HEAD_SHA="${PR_HEAD_SHA}"
          else
            export BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")"
          fi
          .github/scripts/enforce-modifiable-surface.sh

      - name: Shell syntax
        run: |
          bash -n setup.sh
          bash -n benchmark.sh
          bash -n tools/build-mlx-metallib.sh
          bash -n .github/scripts/enforce-trusted-benchmark-workflow.sh
          bash -n .github/scripts/enforce-modifiable-surface.sh
          bash -n .github/scripts/overlay-editable-paths.sh
          bash -n .github/scripts/verify-correctness-golden.sh
          bash -n .github/scripts/validate-benchmark-artifacts.sh
          bash -n .github/scripts/run-semantic-gpqa-gate.sh
          bash -n .github/scripts/run-submission-static-review.sh
          bash -n .github/scripts/deny-private-artifacts.sh
          bash -n .github/scripts/stage-benchmark-artifacts.sh
          bash -n .github/scripts/download-r2-object.sh
          bash -n .github/scripts/upload-r2-object.sh
          bash -n .github/scripts/download-reference-cache-scope.sh
          bash -n .github/scripts/probe-runtime-worker-sandbox.sh

      - name: Build release CLI
        run: |
          mkdir -p .build/clang-module-cache
          swift build -c release

      - name: Save SwiftPM cache
        if: steps.restore_swiftpm_cache.outputs.cache-hit != 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/workspace-state.json
          key: ${{ steps.restore_swiftpm_cache.outputs.cache-primary-key }}

      - name: Unit tests without Metal runtime
        run: |
          swift test --filter 'Transform|BenchmarkSupport|Golden|Score|CheckpointIndex|Safetensors|DenseTensorStore|ExpertSlotBank|DeepSeekConfig|DeepSeekCorrectness|CorrectnessReport|TensorData|MLXTensorBridgeMaps'
