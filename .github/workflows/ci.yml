name: ci

on:
  pull_request:
  push:
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift:
    runs-on: tenki-standard-large-plus-16c-32g
    timeout-minutes: 45
    env:
      CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/.build/clang-module-cache
      MLXFAST_RUN_MLX_RUNTIME_TESTS: "0"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Enforce contestant modifiable surface
        if: startsWith(github.head_ref, 'submissions/') || startsWith(github.ref_name, 'submissions/')
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            export BASE_SHA="${PR_BASE_SHA}"
            export HEAD_SHA="${PR_HEAD_SHA}"
          else
            export BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")"
          fi
          .github/scripts/enforce-modifiable-surface.sh

      - name: Shell syntax
        run: |
          bash -n setup.sh
          bash -n benchmark.sh
          bash -n tools/build-mlx-metallib.sh
          bash -n .github/scripts/enforce-trusted-benchmark-workflow.sh
          bash -n .github/scripts/enforce-modifiable-surface.sh
          bash -n .github/scripts/overlay-editable-paths.sh
          bash -n .github/scripts/verify-correctness-golden.sh
          bash -n .github/scripts/validate-benchmark-artifacts.sh
          bash -n .github/scripts/deny-private-artifacts.sh
          bash -n .github/scripts/download-r2-object.sh
          bash -n .github/scripts/download-reference-cache-scope.sh

      - name: Build release CLI
        run: |
          mkdir -p .build/clang-module-cache
          swift build -c release

      - name: Unit tests without Metal runtime
        run: |
          swift test --filter 'Transform|Submission|BenchmarkSupport|Golden|Score|CheckpointIndex|Safetensors|DenseTensorStore|ExpertSlotBank|DeepSeekConfig|DeepSeekCorrectness|CorrectnessReport|TensorData|MLXTensorBridgeMaps'

      - name: Submission packaging smoke test
        run: |
          BIN="${PWD}/.build/release/mlxfast-swift"
          WORKSPACE="${RUNNER_TEMP}/mlxfast-submit-smoke"
          rm -rf "${WORKSPACE}"
          mkdir -p "${WORKSPACE}/Sources/MLXFastModel" "${WORKSPACE}/Sources/MLXFastTransform"
          cat > "${WORKSPACE}/benchmark.json" <<'JSON'
          {
            "schemaVersion": 1,
            "name": "mlxfast-submit-smoke",
            "editablePaths": [
              "Sources/MLXFastModel",
              "Sources/MLXFastTransform"
            ]
          }
          JSON
          printf 'public enum SmokeModel {}\n' > "${WORKSPACE}/Sources/MLXFastModel/SmokeModel.swift"
          printf 'public enum SmokeTransform {}\n' > "${WORKSPACE}/Sources/MLXFastTransform/SmokeTransform.swift"
          git -C "${WORKSPACE}" init
          git -C "${WORKSPACE}" add benchmark.json Sources
          git -C "${WORKSPACE}" -c user.name="CI" -c user.email="ci@example.test" commit -m "base"
          "${BIN}" submit --contract "${WORKSPACE}/benchmark.json" --base-ref HEAD --output /tmp/mlxfast-submission.zip
          test -s /tmp/mlxfast-submission.zip

      - name: Login smoke test
        run: |
          export XDG_CONFIG_HOME="${RUNNER_TEMP}/mlxfast-config"
          .build/release/mlxfast-swift login test-api-key --api https://yukon.example.test --no-verify
          test -f "${XDG_CONFIG_HOME}/mlxfast/credentials"
          python3 - <<'PY'
          import json
          import os
          import stat
          from pathlib import Path

          path = Path(os.environ["XDG_CONFIG_HOME"]) / "mlxfast" / "credentials"
          data = json.loads(path.read_text())
          assert data["api_key"] == "test-api-key"
          assert data["api_base_url"] == "https://yukon.example.test"
          assert stat.S_IMODE(path.stat().st_mode) == 0o600
          PY

      - name: mactop IOReport access probe
        continue-on-error: true
        run: |
          echo "--- mactop probe: checking IOReport access on this runner ---"

          # Install mactop if not present
          if ! command -v mactop &>/dev/null; then
            echo "Installing mactop via Homebrew..."
            brew install mactop
          fi
          echo "mactop path: $(which mactop)"
          mactop --version || true

          # Run mactop in headless JSON mode for 3 seconds (~30 samples at 100ms)
          echo "Running: mactop --headless --interval 100 --format json (3s)"
          MACTOP_OUT=/tmp/mactop-probe-out.txt
          MACTOP_ERR=/tmp/mactop-probe-err.txt
          timeout 3s mactop --headless --interval 100 --format json >"${MACTOP_OUT}" 2>"${MACTOP_ERR}" || true

          echo "--- stdout (first 2000 bytes) ---"
          head -c 2000 "${MACTOP_OUT}" || true
          echo ""
          echo "--- stderr ---"
          cat "${MACTOP_ERR}" || true

          # Parse and validate: require at least 1 sample with non-zero bandwidth
          python3 - "${MACTOP_OUT}" <<'PY'
          import json, sys

          raw = open(sys.argv[1]).read()

          # Try JSON array first (mactop v2+ bulk format), then line-by-line NDJSON
          samples = []
          try:
              parsed = json.loads(raw)
              if isinstance(parsed, list):
                  samples = parsed
                  print(f"Parsed as JSON array: {len(samples)} samples")
              else:
                  samples = [parsed]
                  print(f"Parsed as single JSON object")
          except Exception:
              for line in raw.splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      samples.append(json.loads(line))
                  except Exception:
                      pass
              print(f"Parsed as NDJSON: {len(samples)} samples")

          if not samples:
              print("FAIL: mactop produced no parseable output — IOReport may be blocked in this VM")
              sys.exit(1)

          # Print all keys from first sample so we can see the field names
          if samples:
              print(f"Sample keys: {list(samples[0].keys())}")

          bw_values = []
          for s in samples:
              for key in ("bandwidth_gbps", "memoryBandwidth", "bandwidth", "bw_gbps"):
                  if key in s:
                      try:
                          bw_values.append(float(s[key]))
                      except (TypeError, ValueError):
                          pass
                      break

          if not bw_values:
              print("WARN: samples present but no recognized bandwidth field — dumping first sample:")
              print(json.dumps(samples[0], indent=2) if samples else "(empty)")
          elif all(v == 0.0 for v in bw_values):
              print(f"FAIL: all {len(bw_values)} bandwidth values are 0.0 — IOReport counters may be zeroed in this VM")
              sys.exit(1)
          else:
              nonzero = [v for v in bw_values if v > 0]
              print(f"PASS: {len(nonzero)}/{len(bw_values)} samples have non-zero bandwidth (max={max(bw_values):.3f} GB/s)")
          PY